  if (cb) cb();
}

function productCardHtml(p) {
  const firstImg = p.images?.[0];
  const img = (typeof firstImg === 'object' ? firstImg?.url : firstImg) || p.image || '';
  const hasVideo = !!p.video;
  const soldHtml = (shop.showSoldCount && p.soldCount > 0)
    ? `<div class="sold">${escapeHtml((shop.soldCountTemplate || 'Куплено: {count}').replace('{count}', p.soldCount))}</div>`
    : '';
  const badges = Array.isArray(p.badges) ? p.badges.filter(b => b && b.text) : [];
  const badgesHtml = (badges.length || getProductPromoBadges(p, 'card').length)
    ? `<div class="product-badges">${badges.map(b => `<span class="product-badge" style="background:${b.color || '#dc2626'};color:${b.textColor || '#fff'}">${escapeHtml(b.text)}</span>`).join('')}${promoBadgesHtml(p, 'card')}</div>`
    : '';
  const si = stockInfo(p);
  const stockHtml = si.tracked
    ? `<div class="sold" style="color:${si.out ? '#dc2626' : '#16a34a'}; font-weight:600;">${si.out ? '✕ Немає в наявності' : '✓ В наявності: ' + si.qty + ' шт'}</div>`
    : '';
  // Режим «купити лише через картку товару»: ховаємо кнопку на картці каталогу зовсім
  // (клік по картці все одно відкриває товар, де є кнопка «В корзину»).
  const cardBtn = shop.hideCardBuyButton
    ? ''
    : si.out
    ? `<button class="add" disabled style="opacity:.55; cursor:not-allowed;" onclick="event.stopPropagation();">${escapeHtml(shop.outOfStockText || 'Немає в наявності')}</button>`
    : `<button class="add ${isInCart(p.id) ? 'in-cart' : ''}" data-product-id="${escapeAttr(p.id)}" onclick="event.stopPropagation(); handleAddBtnClick('${escapeAttr(p.id)}')">${escapeHtml(isInCart(p.id) ? (shop.inCartText || '✓ У кошику') : (shop.addToCartText || 'В корзину'))}</button>`;
  return `
    <div class="product" onclick="openModalById('${escapeAttr(p.id)}')">
      <div class="img-wrap">
        <div class="img">${img ? `<img src="${img}" alt="" loading="lazy" />` : '🖼️'}${img ? wmOverlayHtml() : ''}</div>
        ${badgesHtml}
        ${hasVideo ? '<span class="video-mark">▶ Видео</span>' : ''}
      </div>
      <div class="body">
        <div class="name">${nameHtml(p.name)}</div>
        <div class="price">${p.price} ${escapeHtml(p.currency || '₴')}</div>
        ${soldHtml}
        ${stockHtml}
        ${cardBtn}
      </div>
    </div>
  `;
}

// Перевіряє чи товар вже в кошику (не зважаючи на варіанти).
function isInCart(productId) {
  try {
    const cart = JSON.parse(localStorage.getItem('sotosprint_cart_v1') || '[]');
    return cart.some(i => i.productId === productId);
  } catch { return false; }
}

// Обробляє клік по кнопці "✓ У кошику" згідно з налаштуваннями (mobile vs desktop).
// Повертає true якщо обробив (потрібно зупинити подальшу логіку додавання).
function handleInCartClick(productId, optionId) {
  const optId = optionId || '';
  const isMobile = window.innerWidth <= 700;
  const shouldNothing = isMobile ? !!shop.inCartClickNothingMobile : !!shop.inCartClickNothing;
  const shouldRemove = isMobile ? !!shop.inCartClickRemovesMobile : !!shop.inCartClickRemoves;
  const shouldOpenCart = isMobile
    ? (shop.inCartClickOpensCartMobile !== false)
    : (shop.inCartClickOpensCart !== false);

  // Найвищий пріоритет: «нічого не робити» — клік по товару, що вже в кошику, ігнорується.
  if (shouldNothing) return 'nothing';

  if (shouldRemove) {
    // Підтвердження якщо ввімкнено (окремо для desktop/mobile)
    const shouldConfirm = isMobile ? !!shop.inCartConfirmRemoveMobile : !!shop.inCartConfirmRemove;
    if (shouldConfirm) {
      const confirmText = shop.inCartConfirmRemoveText || 'Прибрати товар з кошика?';
      if (!confirm(confirmText)) return 'cancelled'; // користувач відмовився, але клік оброблено
    }
    // Анімація зникнення (якщо ввімкнена)
    const btn = document.querySelector(`button.add[data-product-id="${productId}"]`);
    const doRemove = () => {
      try {
        const cart = JSON.parse(localStorage.getItem('sotosprint_cart_v1') || '[]');
        // Якщо переданий варіант (optId) — прибираємо ТІЛЬКИ цю позицію (товар+варіант),
        // інакше (кнопка картки без варіанта) — усі позиції цього товару.
        const filtered = optId
          ? cart.filter(i => !(i.productId === productId && (i.optionId || '') === optId))
          : cart.filter(i => i.productId !== productId);
        localStorage.setItem('sotosprint_cart_v1', JSON.stringify(filtered));
        if (typeof renderCart === 'function') renderCart();
        if (typeof updateCartBadge === 'function') updateCartBadge();
        if (typeof updateAddButtons === 'function') updateAddButtons();
        const toastText = (shop.inCartRemoveToastText !== undefined && shop.inCartRemoveToastText !== null)
          ? shop.inCartRemoveToastText
          : '🗑 Прибрано з кошика';
        if (toastText && typeof showToast === 'function') showToast(toastText);
      } catch (e) { console.error('removeFromCart error:', e); }
    };
    if (shop.inCartRemoveAnimation && btn) {
      btn.classList.add('removing-anim');
      setTimeout(() => {
        doRemove();
        // Клас прибереться разом з ре-рендером кнопки в updateAddButtons
      }, 280);
    } else {
      doRemove();
    }
    return 'removed';
  }
  if (shouldOpenCart) {
    if (typeof toggleCart === 'function') toggleCart(true);
    return 'opened';
  }
  return false; // не обробили — стандартна поведінка (додати ще одну штуку)
}

// Єдиний обробник кліку по кнопці "В кошик / ✓ У кошику" на картці товару.
// Враховує налаштування мобільний/десктоп та статус isInCart.
window.handleAddBtnClick = function(productId) {
  if (isInCart(productId) && handleInCartClick(productId)) return;
  // Не в кошику АБО не обробили — стандартна логіка
  if (shop.quickAddToCartEnabled) {
    if (typeof quickAdd === 'function') quickAdd(productId);
  } else {
    if (typeof openModalById === 'function') openModalById(productId);
  }
};

// Оновлює текст всіх кнопок "У кошик" → "✓ У кошику" без перерендеру.
window.updateAddButtons = function() {
  const inCart = shop.inCartText || '✓ У кошику';
  const add = shop.addToCartText || 'В корзину';
  document.querySelectorAll('.product .add[data-product-id]').forEach(btn => {
    const pid = btn.dataset.productId;
    btn.classList.remove('removing-anim');  // прибираємо клас анімації якщо лишився
    if (isInCart(pid)) {
      btn.textContent = inCart;
      btn.classList.add('in-cart');
    } else {
      btn.textContent = add;
      btn.classList.remove('in-cart');
    }
  });
};

// Швидке додавання в кошик з картки товару (без відкриття модалки).
// Якщо у товара є опції / потрібне фото — все одно відкриваємо модалку.
// Якщо товар вже в кошику і inCartClickOpensCart=true — відкриваємо кошик.
window.quickAdd = (productId) => {
  const p = (shop.products || []).find(x => x.id === productId);
  if (!p) return;
  if (stockInfo(p).out) { showToast(shop.outOfStockText || 'Немає в наявності'); return; }
  // Товар вже в кошику — обробляємо за налаштуваннями (remove / open cart / add another)
  if (isInCart(productId) && handleInCartClick(productId)) return;
  // Фото клієнт прикріплює на оформленні (checkout), не в картці — тож фото НЕ привід
  // відкривати картку. Картку відкриваємо лише якщо є варіанти (їх треба обрати до кошика).
  const hasOptions = Array.isArray(p.options) && p.options.length > 0;
  if (hasOptions) {
    openModalById(productId); // поважає режим модалка/сторінка
    return;
  }
  // Простий товар — додаємо одразу qty=1
  const cart = getCart();
  const existing = cart.find(i => i.productId === p.id && !i.optionId);
  if (existing) {
    existing.quantity += 1;
    if (existing.selected === false) existing.selected = true;
  } else {
    cart.push({
      productId: p.id, productName: nameOneLine(p.name),
      optionId: '', optionName: '',
      quantity: 1,
      unitPrice: tierUnitPrice(p, 1),
      currency: p.currency || '₴',
      selected: true,
    });
  }
  // Оптова ціна залежить від кількості — перерахуємо для злитих позицій
  const ln2 = cart.find(i => i.productId === p.id && !i.optionId);
  if (ln2) recomputeItemPrice(ln2);
  saveCart(cart);
  updateCartBadge();
  renderCart();
  showToast(`✅ «${p.name}» додано в кошик`);
};

function showToast(text) {
  let t = document.getElementById('quickAddToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'quickAddToast';
    t.style.cssText = 'position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#16a34a; color:#fff; padding:10px 18px; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.2); z-index:1000; font-size:14px; max-width:90vw; opacity:0; transition:opacity .2s;';
    document.body.appendChild(t);
  }
  t.textContent = text;
  t.style.opacity = '1';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

function openModalById(id) {
  const p = (shop.products || []).find(x => x.id === id);
  if (!p) return;
  // Режим відкриття товару: 'page' — повна сторінка, інакше — модалка
  if (shop.productPageMode === 'page') openProductPage(p);
  else openModal(p);
}

// Підготовка стану товару (спільне для модалки і сторінки): currentProduct, images, відео.
function prepareProduct(p) {
  currentProduct = p;
  currentImgIdx = 0;
  // Нормалізуємо images: підтримуємо string (старий формат) і object (новий: { url, zoomable, link })
  const rawImages = (p.images && p.images.length) ? p.images : (p.image ? [p.image] : []);
  const images = rawImages.map(img => {
    if (typeof img === 'string') return { url: img, zoomable: true, link: '', caption: '', capBg: '', capColor: '', capSize: '' };
    return { url: img.url || '', zoomable: img.zoomable !== false, link: img.link || '', caption: img.caption || '', capBg: img.capBg || '', capColor: img.capColor || '', capSize: img.capSize || '' };
  }).filter(img => img.url);
  window.__currentImages = images;
  window.__imgBeforeVariant = null; // скидаємо пам'ять фото-варіантів при відкритті товару
  const hasVideo = !!parseVideoUrl(p.video);
  window.modalQty_value = 1;
  return { images, hasVideo };
}

// Внутрішній HTML картки товару (галерея + інфо). Спільний для модалки і повної сторінки.
// badgeScope — 'modal' за замовч. (стилі бейджів однакові в обох режимах).
function productDetailHtml(p, images, hasVideo, badgeScope) {
  const scope = badgeScope || 'modal';
  const optActiveStyle = (shop.variantActiveColor ? `--opt-active-bg:${escapeAttr(shop.variantActiveColor)};` : '')
    + (shop.variantActiveTextColor ? `--opt-active-text:${escapeAttr(shop.variantActiveTextColor)};` : '')
    + (shop.variantInactiveColor ? `--opt-bg:${escapeAttr(shop.variantInactiveColor)};` : '')
    + (shop.variantInactiveTextColor ? `--opt-text:${escapeAttr(shop.variantInactiveTextColor)};` : '');
  const optsHtml = (p.options && p.options.length) ? `
    <div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:6px;">Варіанти ${p.options.length > 1 ? '(можна обрати декілька):' : ':'}</div>
      <div class="opt-row" id="optRow" style="${optActiveStyle}">
        ${p.options.map((o) => `
          <span class="opt" data-opt-id="${escapeAttr(o.id)}" data-delta="${o.priceDelta || 0}" data-photo="${parseInt(o.photoNum, 10) || 0}"
                onclick="toggleOpt('${escapeAttr(o.id)}')">${escapeHtml(o.name)}${o.priceDelta ? ` (+${o.priceDelta})` : ''}${(parseInt(o.photoNum,10) > 0) ? '<span class="opt-photo-tag">🖼</span>' : ''}</span>
        `).join('')}
      </div>
    </div>
  ` : '';

  const attrsHtml = (p.attributes && p.attributes.length) ? `
    <div class="attrs">
      ${p.attributes.map(a => `
        <div class="label">${escapeHtml(a.label)}</div>
        <div class="value">${escapeHtml(a.value)}</div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="modal-grid">
      <div class="gallery">
        <div class="main-img" id="mainImgHolder">
          ${images.length ? `<img src="${escapeAttr(images[0].url)}" alt="" id="mainImg" class="${images[0].link ? 'linked' : (images[0].zoomable ? 'zoomable' : '')}" onclick="onMainImageClick()" />` : '<div class="placeholder">🖼️</div>'}
          ${images.length ? wmOverlayHtml() : ''}
          ${images.length ? imgBadgeHtml(images[0]) : ''}
          ${images.length > 1 ? `
            <button class="nav prev" onclick="navImg(-1)">‹</button>
            <button class="nav next" onclick="navImg(1)">›</button>
          ` : ''}
        </div>
        ${(images.length > 1 || hasVideo) ? `
          <div class="thumbs">
            ${images.map((img, i) => `
              <div class="thumb ${i === 0 ? 'active' : ''}" data-idx="${i}" onclick="setImg(${i})">
                <img src="${escapeAttr(img.url)}" loading="lazy" />
              </div>
            `).join('')}
            ${hasVideo ? `<div class="video-thumb" onclick="showVideo()" title="Смотреть видео">▶</div>` : ''}
          </div>
        ` : ''}
      </div>
      <div class="info">
        <h2>${nameHtml(p.name)}</h2>
        ${(shop.productCodeShow && p.sku) ? `<div class="product-sku" style="font-size:12px; color:var(--muted,#6b7280); margin:2px 0 6px;">Код: ${escapeHtml(p.sku)}</div>` : ''}
        <div class="price-line" id="priceLine">${p.price} ${escapeHtml(p.currency || '₴')}</div>
        ${tierHintHtml(p, p.currency || '₴')}
        ${(() => { const si = stockInfo(p); return si.tracked ? `<div class="stock-line" style="margin:6px 0; font-size:14px; font-weight:600; color:${si.out ? '#dc2626' : '#16a34a'};">${si.out ? '✕ Немає в наявності' : '✓ В наявності: ' + si.qty + ' шт'}</div>` : ''; })()}
        ${getProductPromoBadges(p, scope).length ? `<div class="product-badges" style="position:static; margin:6px 0; flex-direction:row; flex-wrap:wrap;">${promoBadgesHtml(p, scope)}</div>` : ''}
        ${p.description ? `<div class="desc">${renderRich(p.description)}</div>` : ''}
        ${attrsHtml}
        ${optsHtml}
        <div class="qty-row">
          <label>Кількість:</label>
          <div class="qty-ctrl">
            <button onclick="modalQty(-1)">−</button>
            <span class="qty-val" id="modalQtyVal">1</span>
            <button onclick="modalQty(1)">+</button>
          </div>
        </div>
        ${(() => { const si = stockInfo(p); if (si.out)
          return `<button class="add-big" id="modalAddBtn" disabled style="opacity:.55; cursor:not-allowed;">${escapeHtml(shop.outOfStockText || 'Немає в наявності')}</button>`;
          const inCart = isInCart(p.id);
          return `<button class="add-big${inCart ? ' in-cart' : ''}" id="modalAddBtn" onclick="addCurrentToCart()">${escapeHtml(inCart ? (shop.inCartText || '✓ У кошику') : (shop.addToCartText || 'В корзину'))}</button>`; })()}
      </div>
    </div>
  `;
}

// Оновити тексти відкритого товару (модалка АБО сторінка) на місці, без перемальовування
// всієї картки — щоб не скидати вибрані варіанти/кількість. Викликається з maybeRefresh,
// коли адмін відредагував товар і витрина підтягнула свіжі дані.
function updateOpenProductFields(p) {
  // Контейнер відкритого товару: модалка (#modalContent) або сторінка (.product-page-card).
  const root = document.querySelector('#modal.show #modalContent')
    || document.querySelector('.product-page-card');
  if (!root) return;
  const nameEl = root.querySelector('.info h2');
  if (nameEl) nameEl.innerHTML = nameHtml(p.name);
  const descEl = root.querySelector('.info .desc');
  const descHtml = p.description ? renderRich(p.description) : '';
  if (descEl) {
    if (descHtml) descEl.innerHTML = descHtml;
    else descEl.remove();
  } else if (descHtml) {
    // опису не було, а тепер зʼявився — вставляємо після ціни/бейджів
    const info = root.querySelector('.info');
    if (info) {
      const d = document.createElement('div');
      d.className = 'desc';
      d.innerHTML = descHtml;
      const priceLine = info.querySelector('#priceLine');
      if (priceLine && priceLine.nextSibling) info.insertBefore(d, priceLine.nextSibling);
      else info.appendChild(d);
    }
  }
  const priceEl = root.querySelector('#priceLine');
  if (priceEl) priceEl.textContent = `${p.price} ${p.currency || '₴'}`;
}

function openModal(p, push = true) {
  const { images, hasVideo } = prepareProduct(p);
  // URL — для шаринга. pushState (а не replace) → свайп/кнопка «назад» закриває модалку.
  // push=false при відкритті за прямим посиланням ?product= (щоб «назад» не виходив із сайту).
  const url = new URL(location);
  url.searchParams.set('product', p.id);
  if (push && !(history.state && history.state.modal)) history.pushState({ modal: p.id }, '', url);
  else history.replaceState({ modal: p.id }, '', url);

  document.getElementById('modalContent').innerHTML =
    `<button class="modal-close" onclick="closeModal()">×</button>` +
    productDetailHtml(p, images, hasVideo, 'modal');
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

// DOM-закриття модалки (анімація + чистка), без зміни історії.
function doCloseModalDom() {
  const modal = document.getElementById('modal');
  const ov = document.getElementById('modalOverlay');
  if (modal) modal.classList.remove('show');
  if (ov) ov.classList.remove('show');
  setTimeout(() => { if (modal) modal.style.display = 'none'; }, 250);
  document.body.style.overflow = '';
  currentProduct = null;
}

// Повна сторінка товару (режим productPageMode === 'page'). Рендериться у #app замість каталогу.
function openProductPage(p) {
  const { images, hasVideo } = prepareProduct(p);
  // Красивий URL /product/ID (pushState — щоб «назад» повертало в каталог)
  const target = '/product/' + encodeURIComponent(p.id);
  if (location.pathname !== target) history.pushState({ product: p.id }, '', target);

  // На сторінці товару ховаємо плаваючу кнопку «Відстежити замовлення» (немає затемнення,
  // що ховало б її як у модалці — інакше налазить на кнопку «В корзину» на мобільному).
  const trackFab = document.getElementById('trackFab');
  if (trackFab) trackFab.style.display = 'none';

  const backLabel = escapeHtml(shop.backToCatalogText || '← Назад до каталогу');
  document.getElementById('app').innerHTML = `
    <div class="wrap">
      <div style="margin:14px 0;">
        <button class="back-to-catalog" onclick="backToCatalog()">${backLabel}</button>
      </div>
      <div class="product-page-card">
        ${productDetailHtml(p, images, hasVideo, 'modal')}
      </div>
    </div>
  `;
  document.body.style.overflow = '';
  window.scrollTo(0, 0);
}

// Повернення з повної сторінки товару в каталог.
function backToCatalog() {
  currentProduct = null;
  if (window.history.length > 1) {
    history.back();
  } else {
    history.pushState({}, '', '/');
    renderShop();
  }
}

function closeModal() {
  // Якщо ми в режимі повної сторінки — це повернення в каталог
  if (shop && shop.productPageMode === 'page' && location.pathname.startsWith('/product/')) {
    backToCatalog();
    return;
  }
  // Якщо модалку відкрито через pushState — повертаємось назад в історії
  // (popstate сам зробить DOM-закриття). Інакше закриваємо напряму.
  if (history.state && history.state.modal) {
    history.back();
    return;
  }
  doCloseModalDom();
  const url = new URL(location);
  url.searchParams.delete('product');
  history.replaceState(null, '', url);
}

window.setImg = (i) => {
  if (!currentProduct) return;
  const images = window.__currentImages || [];
  if (i < 0 || i >= images.length) return;
  currentImgIdx = i;
  const img = images[i];
  const cls = img.link ? 'linked' : (img.zoomable ? 'zoomable' : '');
  document.getElementById('mainImgHolder').innerHTML = `
    <img src="${escapeAttr(img.url)}" alt="" id="mainImg" class="${cls}" onclick="onMainImageClick()" />
    ${wmOverlayHtml()}
    ${imgBadgeHtml(img)}
    ${images.length > 1 ? `
      <button class="nav prev" onclick="navImg(-1)">‹</button>
      <button class="nav next" onclick="navImg(1)">›</button>
    ` : ''}
  `;
  document.querySelectorAll('.thumb').forEach(t => t.classList.toggle('active', parseInt(t.dataset.idx) === i));
  document.querySelectorAll('.video-thumb').forEach(t => t.classList.remove('active'));
};

window.navImg = (delta) => {
  if (!currentProduct) return;
  const images = window.__currentImages || [];
  let i = currentImgIdx + delta;
  if (i < 0) i = images.length - 1;
  if (i >= images.length) i = 0;
  setImg(i);
};

// Клік на основне фото у модалці товару:
// - якщо є link → переходимо за посиланням
// - якщо zoomable → відкриваємо лайтбокс
// - інакше нічого
window.onMainImageClick = () => {
  const images = window.__currentImages || [];
  const img = images[currentImgIdx];
  if (!img) return;
  if (img.link) {
    window.open(img.link, '_blank', 'noopener');
  } else if (img.zoomable !== false) {
    openLightbox(currentImgIdx);
  }
};

// === Lightbox ===
let lightboxIdx = 0;
window.openLightbox = (idx) => {
  const images = window.__currentImages || [];
  if (!images.length) return;
  lightboxIdx = idx || 0;
  let overlay = document.getElementById('lightboxOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'lightboxOverlay';
    overlay.className = 'lightbox-overlay';
    overlay.innerHTML = `
      <button class="lightbox-close" onclick="closeLightbox()">×</button>
      <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)" id="lbPrev">‹</button>
      <img id="lbImage" alt="" onclick="closeLightbox()" />
      <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)" id="lbNext">›</button>
      <div class="lightbox-counter" id="lbCounter"></div>
    `;
    overlay.addEventListener('click', e => { if (e.target === overlay) closeLightbox(); });
    document.body.appendChild(overlay);
  }
  updateLightbox();
  overlay.classList.add('show');
  document.addEventListener('keydown', lightboxKey);
};

window.closeLightbox = () => {
  const overlay = document.getElementById('lightboxOverlay');
  if (overlay) overlay.classList.remove('show');
  document.removeEventListener('keydown', lightboxKey);
};

window.lightboxNav = (delta) => {
  const images = window.__currentImages || [];
  let i = lightboxIdx + delta;
  if (i < 0) i = images.length - 1;
  if (i >= images.length) i = 0;
  lightboxIdx = i;
  updateLightbox();
};

function updateLightbox() {
  const images = window.__currentImages || [];
  const img = images[lightboxIdx];
  if (!img) return;
  document.getElementById('lbImage').src = img.url;
  document.getElementById('lbCounter').textContent = `${lightboxIdx + 1} / ${images.length}`;
  document.getElementById('lbPrev').style.display = images.length > 1 ? '' : 'none';
  document.getElementById('lbNext').style.display = images.length > 1 ? '' : 'none';
}

function lightboxKey(e) {
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft') lightboxNav(-1);
  else if (e.key === 'ArrowRight') lightboxNav(1);
}

window.showVideo = () => {
  if (!currentProduct) return;
  const v = parseVideoUrl(currentProduct.video);
  if (!v) return;
  let html;
  if (v.type === 'direct') {
    html = `<video src="${escapeAttr(v.embedUrl)}" controls autoplay style="width:100%; height:100%; max-height:100%;"></video>`;
  } else {
    // YouTube или Google Drive — оба через iframe
    html = `<iframe width="100%" height="100%" src="${escapeAttr(v.embedUrl)}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="aspect-ratio: 1; max-height: 100%;"></iframe>`;
  }
  document.getElementById('mainImgHolder').innerHTML = html;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.video-thumb').forEach(t => t.classList.add('active'));
};

// Перерахунок ціни у модалці за усіма активними варіантами (сума надбавок).
function recalcModalPrice() {
  if (!currentProduct) return;
  let sum = 0;
  document.querySelectorAll('#optRow .opt.active').forEach(el => { sum += parseFloat(el.dataset.delta) || 0; });
  const q = window.modalQty_value || 1;
  const price = tierUnitPrice(currentProduct, q) + sum;
  const pl = document.getElementById('priceLine');
  if (pl) pl.textContent = `${price} ${currentProduct.currency || '₴'}`;
}
// Перемикання фото за активними варіантами:
// якщо є активний варіант з прив'язаним №фото — показуємо це фото (останній активований у DOM-порядку);
// якщо жодного прив'язаного немає — повертаємось до фото, що було відкрите ДО натискання варіантів.
function updateVariantPhoto() {
  const row = document.getElementById('optRow');
  if (!row) return;
  const images = window.__currentImages || [];
  const activePhotos = Array.from(row.querySelectorAll('.opt.active'))
    .map(el => parseInt(el.dataset.photo, 10) || 0)
    .filter(ph => ph > 0 && (ph - 1) < images.length);
  if (activePhotos.length) {
    if (window.__imgBeforeVariant == null) window.__imgBeforeVariant = currentImgIdx; // запам'ятати відкрите фото
    setImg(activePhotos[activePhotos.length - 1] - 1);
  } else if (window.__imgBeforeVariant != null) {
    setImg(window.__imgBeforeVariant);
    window.__imgBeforeVariant = null;
  }
}
function optById(id) { return ((currentProduct && currentProduct.options) || []).find(o => o.id === id); }
// «Перемикач»: варіант входить у взаємовиключну групу, якщо товар у режимі variantSingle І варіант НЕ позначений як «доповнення» (addon).
// Addon-варіанти завжди незалежні (нажав/віджав), сумуються — навіть у режимі перемикача (гібрид: типи перемикаються, доповнення додаються).
function isExclusiveOpt(o) { return !!(currentProduct && currentProduct.variantSingle) && !(o && o.addon); }
// Натиск перемикає варіант. У режимі перемикача активним лишається тільки один «тип»; «доповнення» та мультивибір — незалежні. Повторний натиск знімає.
window.toggleOpt = (optId) => {
  if (!currentProduct) return;
  const row = document.getElementById('optRow');
  const el = row && row.querySelector(`.opt[data-opt-id="${(window.CSS && CSS.escape) ? CSS.escape(optId) : optId}"]`);
  if (!el) return;
  const willActivate = !el.classList.contains('active');
  if (willActivate && isExclusiveOpt(optById(optId))) {
    // знімаємо інші активні взаємовиключні «типи» (доповнення не чіпаємо)
    row.querySelectorAll('.opt.active').forEach(other => {
      if (other !== el && isExclusiveOpt(optById(other.dataset.optId))) other.classList.remove('active');
    });
  }
  el.classList.toggle('active', willActivate);
  recalcModalPrice();
  updateVariantPhoto();
};
// Сумісність зі старим кодом
window.selectOpt = (optId) => window.toggleOpt(optId);

window.modalQty = (delta) => {
  let v = (window.modalQty_value || 1) + delta;
  let max = 100;
  if (currentProduct) { const si = stockInfo(currentProduct); if (si.tracked) max = Math.max(1, si.qty); }
  if (v < 1) v = 1; if (v > max) v = max;
  window.modalQty_value = v;
  document.getElementById('modalQtyVal').textContent = v;
  recalcModalPrice();
};

function addCurrentToCart() {
  if (!currentProduct) return;
  const p = currentProduct;
  if (stockInfo(p).out) { showToast(shop.outOfStockText || 'Немає в наявності'); return; }
  // Мультивибір: збираємо всі активні варіанти, сумуємо надбавки.
  const activeEls = Array.from(document.querySelectorAll('#optRow .opt.active'));
  const optionIds = [], optionNames = [], optionItems = [];
  let sumDelta = 0;
  for (const el of activeEls) {
    const oid = el.dataset.optId || '';
    const opt = (p.options || []).find(o => o.id === oid);
    if (!opt) continue;
    optionIds.push(oid);
    optionNames.push(opt.name || '');
    optionItems.push({ id: oid, name: opt.name || '', priceDelta: opt.priceDelta || 0, photoNum: parseInt(opt.photoNum, 10) || 0 });
    sumDelta += (opt.priceDelta || 0);
  }
  const optionId = optionIds.join('+');       // композитний ключ (для ідентичності рядка/промокодів)
  const optionName = optionNames.join(' + ');  // рядок для відображення (кошик/чекаут/Telegram)
  const qty = window.modalQty_value || 1;

  // Якщо ця позиція (товар+варіант) вже в кошику — поводимось ІДЕНТИЧНО кнопці на головній:
  // за налаштуваннями (прибрати / відкрити кошик / додати ще). handleInCartClick повертає
  // 'removed' (прибрали), 'opened' (відкрили кошик) або false (нічого — додати ще штуку).
  const alreadyInCart = getCart().some(i => i.productId === p.id && (i.optionId || '') === optionId);
  if (alreadyInCart) {
    const action = handleInCartClick(p.id, optionId);
    if (action === 'removed') {
      // Закриваємо картку лише якщо це дозволено налаштуванням (за замовч. так)
      if (shop.closeProductAfterRemove !== false) {
        if (shop.productPageMode === 'page' && location.pathname.startsWith('/product/')) backToCatalog();
        else closeModal();
      } else {
        // Не закриваємо — оновлюємо кнопку в актуальний стан (товар міг бути прибраний)
        setTimeout(() => {
          const b = document.getElementById('modalAddBtn');
          if (!b) return;
          const nowIn = isInCart(p.id);
          b.classList.toggle('in-cart', nowIn);
          b.textContent = nowIn ? (shop.inCartText || '✓ У кошику') : (shop.addToCartText || 'В корзину');
        }, 300);
      }
      return;
    }
    if (action === 'opened') {
      // Кошик відкрито поверх картки.
      // МОДАЛЬНИЙ режим: closeModal() закриває DOM безпечно (НЕ через history.back) — тож
      //   поважаємо чекбокс закриття; модалка ховається, кошик лишається поверх.
      // СТОРІНКОВИЙ режим: НЕ закриваємо (backToCatalog→history.back одразу ж закрив би
      //   щойно відкритий кошик і зламав би сторінку товару — це й був баг).
      const pageMode = shop.productPageMode === 'page' && location.pathname.startsWith('/product/');
      if (!pageMode && shop.closeProductAfterRemove !== false) closeModal();
      return;
    }
    // Будь-яка інша оброблена дія (напр. 'cancelled' — користувач відмовився прибирати) —
    // НЕ додаємо повторно. Падаємо нижче тільки коли action === false (нічого не зробили).
    if (action !== false) return;
  }

  const cart = getCart();
  const existing = cart.find(i => i.productId === p.id && (i.optionId || '') === optionId);
  if (existing) {
    existing.quantity += qty;
    if (existing.selected === false) existing.selected = true; // повторное добавление включает галку
  } else {
    cart.push({
      productId: p.id, productName: nameOneLine(p.name),
      optionId, optionName, optionIds, optionItems,
      quantity: qty,
      unitPrice: tierUnitPrice(p, qty) + sumDelta,
      currency: p.currency || '₴',
      selected: true,
    });
  }
  // Оптова ціна залежить від кількості — перерахуємо для злитих позицій теж
  const ln = cart.find(i => i.productId === p.id && (i.optionId || '') === optionId);
  if (ln) recomputeItemPrice(ln);
  saveCart(cart);
  renderCart();
  updateCartBadge();

  // Анимация
  const btn = document.getElementById('modalAddBtn');
  btn.classList.add('in-cart');
  btn.textContent = '✓ Добавлено в корзину';
  // Закривати картку після додавання — лише якщо увімкнено в налаштуваннях (за замовч. так).
  if (shop.closeProductAfterAdd !== false) {
    setTimeout(() => { closeModal(); }, 800);
  } else {
    // Не закриваємо — повертаємо текст кнопки в «✓ У кошику», щоб було видно стан
    setTimeout(() => {
      btn.textContent = shop.inCartText || '✓ У кошику';
    }, 800);
  }
}

// === Корзина ===
function getCart() {
  try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch { return []; }
}
function saveCart(c) {
  localStorage.setItem(CART_KEY, JSON.stringify(c));
  // Оновлюємо текст кнопок "У кошик" / "✓ У кошику"
  if (typeof updateAddButtons === 'function') updateAddButtons();
}

// Валідація кошика проти поточного каталогу — видаляє товари які зникли або вимкнено
function validateCart() {
  if (!shop || !Array.isArray(shop.products)) return;
  const cart = getCart();
  if (cart.length === 0) return;
  const productMap = new Map(shop.products.map(p => [p.id, p]));
  const removed = [];
  const updated = cart.filter(item => {
    const p = productMap.get(item.productId);
    if (!p) {
      removed.push(item.productName + ' (більше немає в каталозі)');
      return false;
    }
    if (p.enabled === false) {
      removed.push(item.productName + ' (тимчасово недоступний)');
      return false;
    }
    // Перевіряємо варіанти якщо були (мультивибір — масив optionItems)
    if (Array.isArray(item.optionItems) && item.optionItems.length) {
      const opts = Array.isArray(p.options) ? p.options : [];
      let sumDelta = 0, missing = false;
      const freshNames = [];
      for (const oi of item.optionItems) {
        const opt = opts.find(o => o.id === oi.id);
        if (!opt) { missing = true; break; }
        sumDelta += (opt.priceDelta || 0);
        freshNames.push(opt.name || '');
        oi.name = opt.name || ''; oi.priceDelta = opt.priceDelta || 0; oi.photoNum = parseInt(opt.photoNum, 10) || 0;
      }
      if (missing) {
        removed.push(item.productName + ' (' + (item.optionName || '') + ' — варіант видалено)');
        return false;
      }
      item.optionName = freshNames.join(' + ');
      const newUnitPrice = tierUnitPrice(p, item.quantity) + sumDelta;
      if (item.unitPrice !== newUnitPrice) item.unitPrice = newUnitPrice;
    } else if (item.optionId && Array.isArray(p.options)) {
      // Старий формат (один варіант)
      const opt = p.options.find(o => o.id === item.optionId);
      if (!opt) {
        removed.push(item.productName + ' (' + item.optionName + ' — варіант видалено)');
        return false;
      }
      // Оновлюємо ціну опції якщо змінилась
      const newUnitPrice = tierUnitPrice(p, item.quantity) + (opt.priceDelta || 0);
      if (item.unitPrice !== newUnitPrice) item.unitPrice = newUnitPrice;
    } else {
      // Без варіантів — ціна може залежати від кількості (опт)
      const newUnitPrice = tierUnitPrice(p, item.quantity);
      if (item.unitPrice !== newUnitPrice) item.unitPrice = newUnitPrice;
    }
    return true;
  });
  if (removed.length > 0) {
    saveCart(updated);
    showCartNotice('🛒 З кошика видалено: ' + removed.join(', '));
  } else if (updated.length !== cart.length || JSON.stringify(updated) !== JSON.stringify(cart)) {
    saveCart(updated);
  }
}

// Тимчасове повідомлення про зміни в кошику
function showCartNotice(msg) {
  const existing = document.getElementById('cartNotice');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'cartNotice';
  div.style.cssText = 'position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #fef3c7; color: #92400e; padding: 12px 20px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.15); font-size: 14px; z-index: 1000; max-width: 90vw; text-align: center;';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 6000);
}

function changeQty(idx, delta) {
  const cart = getCart();
  if (!cart[idx]) return;
  cart[idx].quantity = Math.max(1, cart[idx].quantity + delta);
  recomputeItemPrice(cart[idx]); // оптова ціна залежить від кількості
  saveCart(cart);
  renderCart();
  updateCartBadge();
}
function removeItem(idx) {
  const cart = getCart();
  cart.splice(idx, 1);
  saveCart(cart);
  renderCart();
  updateCartBadge();
}

// === Промокод у кошику ===
const PROMO_KEY = 'sotosprint_promo_v1';
function getAppliedPromo() {
  try { return localStorage.getItem(PROMO_KEY) || ''; } catch { return ''; }
}
function setAppliedPromo(code) {
  try { if (code) localStorage.setItem(PROMO_KEY, code); else localStorage.removeItem(PROMO_KEY); } catch {}
}

// Знаходить промокод за кодом і перевіряє базову валідність (активність, дати, ліміт).
function findValidPromo(code) {
  const c = (code || '').trim().toUpperCase();
  if (!c) return { error: '' };
  const promo = (shop?.promoCodes || []).find(p => (p.code || '').toUpperCase() === c && p.enabled !== false);
  if (!promo) return { error: '❌ Код не знайдено' };
  const now = new Date();
  if (promo.validFrom && new Date(promo.validFrom) > now) return { error: '❌ Код ще не активний' };
  if (promo.validUntil && new Date(promo.validUntil) < now) return { error: '❌ Код протерміновано' };
  if (promo.maxUses && promo.maxUses > 0 && (promo.used || 0) >= promo.maxUses) return { error: '❌ Ліміт використань вичерпано' };
  return { promo };
}

// Чи діє промокод на конкретну позицію кошика (за scope).
function promoEligibleItem(promo, item) {
  const scope = promo.scope || 'all';
  if (scope === 'all') return true;
  const prod = (shop?.products || []).find(p => p.id === item.productId);
  if (scope === 'categories') return Array.isArray(promo.categoryIds) && promo.categoryIds.includes(prod?.categoryId);
  if (scope === 'products') return Array.isArray(promo.productIds) && promo.productIds.includes(item.productId);
  return false;
}

// Рахує знижку по застосованому промокоду для ВИБРАНИХ (selected) позицій кошика.
// Повертає { promo, discount, freeShipping, eligibleIds:Set, selectedTotal, error }
function computeCartPromo(cart) {
  const code = getAppliedPromo();
  const selected = cart.filter(i => i.selected !== false);
  const selectedTotal = selected.reduce((s, i) => s + i.unitPrice * i.quantity, 0);
  if (!code) return { discount: 0, freeShipping: false, eligibleIds: new Set(), selectedTotal };
  const { promo, error } = findValidPromo(code);
  if (!promo) return { discount: 0, freeShipping: false, eligibleIds: new Set(), selectedTotal, error };
  if (promo.minOrder && selectedTotal < promo.minOrder) {
    return { discount: 0, freeShipping: false, eligibleIds: new Set(), selectedTotal, promo, error: `❌ Мін. сума замовлення: ${promo.minOrder}₴` };
  }
  const eligibleIds = new Set();
  let eligibleTotal = 0;
  for (const it of selected) {
    if (promoEligibleItem(promo, it)) { eligibleIds.add(it.productId + '|' + (it.optionId || '')); eligibleTotal += it.unitPrice * it.quantity; }
  }
  const scope = promo.scope || 'all';
  if (scope !== 'all' && eligibleTotal <= 0) {
    return { discount: 0, freeShipping: false, eligibleIds, selectedTotal, promo, error: '❌ Промокод не діє на товари в кошику' };
  }
  const base = scope === 'all' ? selectedTotal : eligibleTotal;
  let discount = 0, freeShipping = false;
  if (promo.type === 'percent') discount = Math.round(base * ((promo.value || 0) / 100));
  else if (promo.type === 'fixed') discount = Math.min(promo.value || 0, base);
  else if (promo.type === 'shipping') freeShipping = true;

  // Знижка по кожній підходящій позиції (для відображення «−X₴» у рядку).
  // percent — кожен рядок мінус свій %; fixed — розподіляємо пропорційно, залишок на останню позицію.
  const lineDiscounts = {};
  const eligibleItems = selected.filter(it => {
    const isElig = scope === 'all' || promoEligibleItem(promo, it);
    return isElig;
  });
  if (promo.type === 'percent' && base > 0) {
    for (const it of eligibleItems) {
      const key = it.productId + '|' + (it.optionId || '');
      lineDiscounts[key] = Math.round(it.unitPrice * it.quantity * ((promo.value || 0) / 100));
    }
  } else if (promo.type === 'fixed' && base > 0) {
    let acc = 0;
    eligibleItems.forEach((it, i) => {
      const key = it.productId + '|' + (it.optionId || '');
      const lineTotal = it.unitPrice * it.quantity;
      let d;
      if (i === eligibleItems.length - 1) d = discount - acc; // залишок останній позиції
      else { d = Math.round(discount * (lineTotal / base)); acc += d; }
      lineDiscounts[key] = Math.max(0, d);
    });
  }
  return { promo, discount, freeShipping, eligibleIds, selectedTotal, eligibleTotal, lineDiscounts };
}

function applyCartPromo() {
  const input = document.getElementById('cartPromoInput');
  const code = (input?.value || '').trim().toUpperCase();
  if (!code) { setAppliedPromo(''); renderCart(); return; }
  const { promo, error } = findValidPromo(code);
  if (!promo) {
    setAppliedPromo('');
    const st = document.getElementById('cartPromoStatus');
    if (st) { st.innerHTML = `<span style="color:#dc2626;">${escapeHtml(error || 'Код не знайдено')}</span>`; }
    return;
  }
  setAppliedPromo(code);
  renderCart();
}
function removeCartPromo() {
  setAppliedPromo('');
  renderCart();
}

// Рядок з варіантами товару в кошику: мініатюра прив'язаного фото + «+ Назва».
function renderCartOpts(item, product) {
  const items = Array.isArray(item.optionItems) ? item.optionItems : null;
  if (items && items.length) {
    const imgs = (product && product.images && product.images.length) ? product.images : (product && product.image ? [product.image] : []);
    const chips = items.map(oi => {
      let thumb = '';
      const ph = parseInt(oi.photoNum, 10) || 0;
      if (ph > 0 && imgs[ph - 1]) {
        const im = imgs[ph - 1];
        const u = (typeof im === 'object' ? im?.url : im) || '';
        if (u) thumb = `<img src="${escapeAttr(u)}" class="cart-opt-thumb" alt="" />`;
      }
      return `<span class="cart-opt${thumb ? '' : ' no-thumb'}">${thumb}+ ${escapeHtml(oi.name)}</span>`;
    }).join('');
    return `<div class="cart-opts">${chips}</div>`;
  }
  return item.optionName ? `<div class="opt-name">${escapeHtml(item.optionName)}</div>` : '';
}

function renderCart() {
  const cart = getCart();
  const itemsEl = document.getElementById('cartItems');
  const totalEl = document.getElementById('cartTotal');
  const checkoutBtn = document.getElementById('checkoutBtn');
  const promoBox = document.getElementById('cartPromoBox');

  if (cart.length === 0) {
    itemsEl.innerHTML = `<div class="cart-empty">${escapeHtml(shop?.emptyCartText || 'Кошик порожній')}</div>`;
    totalEl.textContent = '0 ₴';
    checkoutBtn.classList.add('disabled');
    if (promoBox) promoBox.style.display = 'none';
    return;
  }

  // Розрахунок промокоду (по вибраних позиціях)
  const promoInfo = computeCartPromo(cart);
  const lineDiscounts = (!promoInfo.error && promoInfo.lineDiscounts) ? promoInfo.lineDiscounts : {};

  let total = 0;
  let selectedCount = 0;
  let selectedQty = 0;
  itemsEl.innerHTML = cart.map((item, idx) => {
    // По умолчанию selected=true (для старых элементов в localStorage)
    if (item.selected === undefined) item.selected = true;
    const lineTotal = item.unitPrice * item.quantity;
    if (item.selected) {
      total += lineTotal;
      selectedCount++;
      selectedQty += item.quantity;
    }
    // Достаём картинку товара (підтримка string і {url} форматів)
    const product = (shop?.products || []).find(p => p.id === item.productId);
    const firstImg = product?.images?.[0];
    const thumb = (typeof firstImg === 'object' ? firstImg?.url : firstImg) || product?.image || '';
    // Знижка по цьому рядку (для будь-якого типу промокоду — percent/fixed)
    const itemKey = item.productId + '|' + (item.optionId || '');
    const lineDisc = item.selected ? (lineDiscounts[itemKey] || 0) : 0;
    const cur = escapeHtml(item.currency);
    let priceLineHtml;
    if (lineDisc > 0) {
      const newLine = Math.max(0, lineTotal - lineDisc);
      priceLineHtml = `${item.unitPrice} ${cur} × ${item.quantity} = <s style="color:#9ca3af;">${lineTotal} ${cur}</s> <strong style="color:#16a34a;">${newLine} ${cur}</strong><br><span style="color:#7c3aed; font-size:12px;">🎟 промокод: −${lineDisc} ${cur}</span>`;
    } else {
      priceLineHtml = `${item.unitPrice} ${cur} × ${item.quantity} = <strong>${lineTotal} ${cur}</strong>`;
    }
    return `
      <div class="cart-item ${item.selected ? '' : 'unselected'}">
        <label class="cart-check" title="${item.selected ? 'Купувати' : 'Не купувати цього разу'}">
          <input type="checkbox" ${item.selected ? 'checked' : ''} onchange="toggleItemSelected(${idx}, this.checked)" />
        </label>
        <div class="thumb">${thumb ? `<img src="${thumb}" alt="" />` : ''}</div>
        <div class="info-c">
          <div class="name">${escapeHtml(item.productName)}</div>
          ${renderCartOpts(item, product)}
          <div class="price-line">${priceLineHtml}</div>
          <div class="qty-ctrl">
            <button onclick="changeQty(${idx}, -1)">−</button>
            <span class="qty-val">${item.quantity}</span>
            <button onclick="changeQty(${idx}, 1)">+</button>
          </div>
          <button class="remove" onclick="removeItem(${idx})">${escapeHtml(shop?.cartItemRemoveText || 'Видалити')}</button>
        </div>
      </div>
    `;
  }).join('');
  // Сохраняем — на случай если selected было undefined и мы нормализовали
  saveCart(cart);

  // Блок промокоду
  if (promoBox) {
    promoBox.style.display = (shop?.promoEnabled !== false) ? 'block' : 'none';
    const input = document.getElementById('cartPromoInput');
    const st = document.getElementById('cartPromoStatus');
    const applied = getAppliedPromo();
    if (input && document.activeElement !== input) input.value = applied;
    if (st) {
      if (applied && promoInfo.promo && !promoInfo.error && (promoInfo.discount > 0 || promoInfo.freeShipping)) {
        const txt = promoInfo.freeShipping ? '🚚 Безкоштовна доставка'
                  : `−${promoInfo.discount} ₴`;
        st.innerHTML = `<span style="color:#16a34a; font-weight:600;">✅ ${escapeHtml(applied)}: ${txt}</span> <a href="#" onclick="event.preventDefault(); removeCartPromo();" style="color:#dc2626; margin-left:6px;">прибрати</a>`;
      } else if (applied && promoInfo.error) {
        st.innerHTML = `<span style="color:#dc2626;">${escapeHtml(promoInfo.error)}</span> <a href="#" onclick="event.preventDefault(); removeCartPromo();" style="color:#6b7280; margin-left:6px;">прибрати</a>`;
      } else {
        st.innerHTML = '';
      }
    }
  }

  // Підсумок зі знижкою
  const finalTotal = Math.max(0, total - (promoInfo.error ? 0 : promoInfo.discount));
  if (!promoInfo.error && promoInfo.discount > 0) {
    totalEl.innerHTML = `<s style="color:#9ca3af; font-weight:400; font-size:0.85em;">${total} ₴</s> ${finalTotal} ₴`;
  } else {
    totalEl.textContent = finalTotal + ' ₴';
  }

  if (selectedCount === 0) {
    checkoutBtn.classList.add('disabled');
    checkoutBtn.textContent = shop?.cartNothingSelectedText || 'Оберіть хоча б один товар';
  } else {
    checkoutBtn.classList.remove('disabled');
    checkoutBtn.textContent = shop?.proceedCheckoutText || 'Оформити замовлення';
  }
}

function toggleItemSelected(idx, selected) {
  const cart = getCart();
  if (!cart[idx]) return;
  cart[idx].selected = !!selected;
  saveCart(cart);
  renderCart();
  updateCartBadge();
}

function updateCartBadge() {
  const cart = getCart();
  // Бейдж рахує ВСІ товари в кошику (незалежно від галочки) — щоб збігалося з підсвіткою
  // кнопок на головній (вони теж дивляться лише «чи лежить у кошику»). Галочка впливає
  // тільки на те, що піде в замовлення при оформленні.
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  const badge = document.getElementById('cartBadge');
  if (badge) badge.textContent = count;
}

function toggleCart(open) {
  if (open) {
    const isOpen = document.getElementById('cartPanel').classList.contains('show');
    // pushState → свайп/кнопка «назад» закриває кошик, а не виходить із сайту
    if (!isOpen && !(history.state && history.state.cart)) {
      history.pushState({ cart: true }, '', location.href);
    }
    document.getElementById('cartPanel').classList.add('show');
    document.getElementById('cartOverlay').classList.add('show');
  } else {
    // Якщо кошик відкрито через pushState — повертаємось назад (popstate зробить DOM-закриття)
    if (history.state && history.state.cart) { history.back(); return; }
    doCloseCartDom();
  }
}
// DOM-закриття кошика без зміни історії
function doCloseCartDom() {
  document.getElementById('cartPanel').classList.remove('show');
  document.getElementById('cartOverlay').classList.remove('show');
}

// === Утилиты ===
// Парсит URL видео — поддерживает YouTube и Google Drive.
// Возвращает { type: 'youtube'|'drive'|null, embedUrl: '...' }
function parseVideoUrl(url) {
  const s = String(url || '').trim();
  if (!s) return null;
  // YouTube: youtube.com/watch?v=ID, youtu.be/ID, youtube.com/embed/ID, youtube.com/shorts/ID
  const yt = s.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (yt) return { type: 'youtube', embedUrl: `https://www.youtube.com/embed/${yt[1]}?autoplay=1` };
  // Google Drive: drive.google.com/file/d/FILE_ID/view, drive.google.com/open?id=FILE_ID
  const gd = s.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/);
  if (gd) return { type: 'drive', embedUrl: `https://drive.google.com/file/d/${gd[1]}/preview` };
  // Прямой видео-файл (mp4/webm/mov)
  if (/\.(mp4|webm|mov|m4v)(\?|$)/i.test(s)) return { type: 'direct', embedUrl: s };
  return null;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
// Назва товара з ручними переносами рядка: екрануємо, а \n робимо <br> (для картки/модалки).
function nameHtml(s) { return escapeHtml(s).replace(/\r?\n/g, '<br>'); }
// Назва в один рядок (кошик, замовлення, заголовки, telegram) — переноси замінюємо на пробіл.
function nameOneLine(s) { return String(s ?? '').replace(/\s*[\r\n]+\s*/g, ' ').trim(); }
function stripEmoji(s) { return String(s ?? '').replace(/[\u{1F300}-\u{1FAFF}]/gu, '').trim(); }

// Знаходить URL у тексті і робить їх клікабельними. Текст екранується для безпеки.
// Підтримує: http://, https://, www., тел/email
function linkifyText(text) {
  const escaped = escapeHtml(text || '');
  return escaped
    .replace(/(https?:\/\/[^\s<>"]+)/gi, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);">$1</a>')
    .replace(/(\s|^)(www\.[^\s<>"]+)/gi, '$1<a href="https://$2" target="_blank" rel="noopener" style="color:var(--accent);">$2</a>')
    .replace(/\n/g, '<br>');
}

// === Rich-text рендер: HTML з редактора чистимо санітайзером; легасі-текст — як раніше ===
// ЗАЛІЗНЕ ПРАВИЛО: гілка rich — ТІЛЬКИ санітайз; гілка plain — ТІЛЬКИ linkify/nameHtml.
// Ніколи не проганяти linkifyText по санітизованому HTML (подвійне кодування).
function looksLikeHtml(v) {
  // Тег має закритися (>, />) або мати атрибут (style=/href=) — щоб «ширина<b висота» НЕ
  // вважалось HTML (там після b іде текст, а не закриття/атрибут).
  return typeof v === 'string' && /<(b|strong|i|em|u|s|strike|p|ul|ol|li|a|span|br)(\s*\/?>|\s+[a-z-]+\s*=)/i.test(v);
}
function renderRich(v) {
  if (!v) return '';
  if (looksLikeHtml(v) && window.sanitizeRichHtml) return window.sanitizeRichHtml(v, { mode: 'full' });
  return linkifyText(v);
}
function renderRichCompact(v) {
  if (!v) return '';
  if (looksLikeHtml(v) && window.sanitizeRichHtml) return window.sanitizeRichHtml(v, { mode: 'compact' });
  return nameHtml(v);
}
function htmlToPlainText(v) {
  if (!v) return '';
  if (!looksLikeHtml(v)) return String(v);
  try {
    const d = new DOMParser().parseFromString(v, 'text/html');
    return (d.body.textContent || '').replace(/\s+/g, ' ').trim();
  } catch (e) { return String(v).replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim(); }
}
// Заголовок магазину (шапка): HTML з редактора → компактний санітайз; легасі-текст →
// екрануємо + \n і токен \\n → <br> (як було). Для вкладки/SEO беремо htmlToPlainText.
function renderTitle(v) {
  if (!v) return '';
  if (looksLikeHtml(v) && window.sanitizeRichHtml) return window.sanitizeRichHtml(v, { mode: 'compact' });
  return escapeHtml(v).replace(/\r?\n|\\n/g, '<br>');
}
// Чистий текст заголовка (вкладка браузера, SEO-фолбек): без HTML, переноси → пробіл.
function titlePlain(v) {
  return htmlToPlainText(v).replace(/\\n/g, ' ').replace(/\s+/g, ' ').trim();
}
