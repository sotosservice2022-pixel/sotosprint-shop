  <!-- PWA-маніфест: статично в HTML, щоб Chrome одразу бачив устанавливаемість.
       Якщо PWA вимкнено в адмінці — /manifest.webmanifest віддає 404, і браузер його ігнорує
       (нічого не ламається). Service worker реєструється лише при ввімкненому PWA (див. setupPWA). -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Favicon: порожній за замовчуванням (data:,). Якщо в адмінці вибрано іконку —
       сервер (functions/index.js) підставляє faviconImage у цей link. -->
  <link rel="icon" href="data:," />

  <style>
    :root {
      --accent: #0b8aff; --accent-dark: #0670d9; --accent-text: #ffffff;
      --bg: #f4f6fa; --card: #fff; --text: #1c2129; --muted: #6b7280;
      --border: #e5e7eb; --success: #16a34a; --error: #dc2626;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px;
    }

    /* === Шапка === */
    .topbar {
      background: var(--topbar-bg, #fff);
      background-image: var(--topbar-bg-image, none);
      background-size: cover;
      background-position: center;
      color: var(--topbar-text, #1c2129);
      box-shadow: 0 1px 8px rgba(20,30,60,.06);
      padding: 12px 16px; position: sticky; top: 0; z-index: 50;
      display: grid;
      grid-template-columns: minmax(0, max-content) minmax(0, 1fr) minmax(0, max-content);
      align-items: center;
      gap: 12px;
    }
    /* Уніфікована сітка для всіх позицій назви — крайні колонки розміром під вміст,
       центральна 1fr заповнює простір. h1 з overflow:hidden+ellipsis сам стискається коли треба. */
    .topbar.title-left { grid-template-columns: minmax(0, max-content) minmax(0, 1fr) minmax(0, max-content); }
    .topbar.title-right { grid-template-columns: minmax(0, max-content) minmax(0, 1fr) minmax(0, max-content); }
    .topbar-zone {
      display: flex; align-items: center; gap: 12px;
      min-width: 0;
    }
    .topbar-zone.left { justify-self: start; justify-content: flex-start; }
    .topbar-zone.center { justify-self: center; justify-content: center; max-width: 100%; min-width: 0; }
    .topbar-zone.right { justify-self: end; justify-content: flex-end; }
    .topbar-zone:empty { display: none; }
    .topbar .logo { flex-shrink: 0; display: flex; align-items: center; transform: translateX(var(--logo-offset-x, 0)); }
    .topbar .logo img {
      height: 40px; width: auto; max-width: 120px; object-fit: contain;
      border-radius: 6px;
    }
    .topbar h1 {
      font-size: var(--topbar-title-size, 17px);
      margin: 0; font-weight: 700;
      flex: 0 1 auto;       /* НЕ розтягуємо, ТАК стискаємо */
      min-width: 0;
      max-width: 100%;
      overflow: hidden; color: inherit;
      white-space: normal;                       /* дозволяємо перенос на 2-й рядок */
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      line-height: 1.2;
      transform: translateX(var(--title-offset-x, 0));
    }
    .topbar a.title-link h1 { transform: none; }   /* щоб трансформ не дублювався */
    /* Якщо назва клікабельна — зміщення йде на саму обгортку <a> */
    .topbar a.title-link {
      flex: 1 1 auto;
      min-width: 0;
      max-width: 100%;
      color: inherit;
      text-decoration: none;
      display: block;
      overflow: hidden;
      transform: translateX(var(--title-offset-x, 0));
    }
    /* Зміщення інших елементів шапки */
    .topbar .header-search { transform: translateX(var(--search-offset-x, 0)); }
    .topbar .header-menu { transform: translateX(var(--menu-offset-x, 0)); }
    .topbar .cart-btn { transform: translateX(var(--cart-offset-x, 0)); }
    .topbar .cart-btn:active { transform: translateX(var(--cart-offset-x, 0)) scale(.97); }

    /* === Режим "Назва строго по центру екрана" (absolute) === */
    .topbar.title-absolute-center { position: sticky; }     /* sticky вже є — створює containing block */
    .topbar.title-absolute-center .topbar-zone.center {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      transform: translateX(-50%) translateX(var(--title-offset-x, 0));
      display: flex;
      align-items: center;
      max-width: 70%;        /* щоб не виходило за екран на вузьких */
      z-index: 1;
      pointer-events: none;
    }
    .topbar.title-absolute-center .topbar-zone.center > * { pointer-events: auto; }
    /* В абсолютному режимі h1/title-link transform не подвоюємо — він на зоні */
    .topbar.title-absolute-center h1,
    .topbar.title-absolute-center a.title-link { transform: none; }

    /* На мобільних — окреме зміщення */
    @media (max-width: 700px) {
      .topbar .logo { transform: translateX(var(--logo-offset-x-mobile, 0)); }
      .topbar h1 { transform: translateX(var(--title-offset-x-mobile, 0)); }
      .topbar a.title-link { transform: translateX(var(--title-offset-x-mobile, 0)); }
      .topbar a.title-link h1 { transform: none; }
      .topbar .header-search { transform: translateX(var(--search-offset-x-mobile, 0)); }
      .topbar .header-menu { transform: translateX(var(--menu-offset-x-mobile, 0)); }
      .topbar .cart-btn { transform: translateX(var(--cart-offset-x-mobile, 0)); }
      .topbar .cart-btn:active { transform: translateX(var(--cart-offset-x-mobile, 0)) scale(.97); }
      .topbar.title-absolute-center .topbar-zone.center {
        transform: translateX(-50%) translateX(var(--title-offset-x-mobile, 0));
      }
      .topbar.title-absolute-center h1,
      .topbar.title-absolute-center a.title-link { transform: none; }
    }
    /* В бокових зонах title не повинен розтягуватись (інакше grid auto зону не визначає) */
    .topbar.title-left .topbar-zone.left h1,
    .topbar.title-right .topbar-zone.right h1,
    .topbar.title-left .topbar-zone.left a.title-link,
    .topbar.title-right .topbar-zone.right a.title-link {
      flex: 0 1 auto;       /* дозволяємо стискатися */
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }
    .topbar .topbar-contacts { min-width: 0; flex-shrink: 1; }
    /* На мобільному використовуємо альтернативний (короткий) заголовок */
    @media (max-width: 700px) {
      .topbar h1 {
        font-size: calc(var(--topbar-title-size, 17px) * 0.85);
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.2;
        max-height: calc(var(--topbar-title-size, 17px) * 0.85 * 1.2 * 3);
        flex: 1 1 0;          /* на мобільному стискаємось щоб помістилось з лого */
        min-width: 0;
      }
      /* Лого менше на мобільному щоб не з'їдало місце для назви */
      .topbar .logo img { height: 32px; max-width: 70px; }
      /* Зона з лого+назвою не повинна займати >65% ширини */
      .topbar.title-left .topbar-zone.left,
      .topbar.title-right .topbar-zone.right {
        max-width: 65%;
        min-width: 0;
        overflow: hidden;
      }
      .topbar.title-left .topbar-zone.left h1,
      .topbar.title-right .topbar-zone.right h1,
      .topbar.title-left .topbar-zone.left a.title-link,
      .topbar.title-right .topbar-zone.right a.title-link {
        flex: 1 1 0;
        min-width: 0;
      }
      .topbar { align-items: flex-start; padding-top: 10px; padding-bottom: 10px; }
    }
    .title-mobile { display: none; }
    @media (max-width: 700px) {
      .title-desktop { display: none; }
      .title-mobile { display: inline; }
    }
    .topbar-contacts {
      display: flex; flex-direction: column; gap: 2px; align-items: flex-end;
      font-size: var(--topbar-contacts-size, 12px); line-height: 1.3; color: inherit;
      max-width: 280px; overflow: hidden;
    }
    .topbar-contacts > div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .topbar-contacts a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; opacity: .85; }
    .topbar-contacts a:hover { opacity: 1; }
    @media (max-width: 700px) {
      .topbar-contacts { display: none; }
    }

    /* Меню в шапці */
    .header-menu {
      display: flex; gap: 4px; flex-wrap: wrap;
      flex-shrink: 0;
    }
    .header-menu-item {
      background: none; border: none; color: inherit; cursor: pointer;
      padding: 8px 14px; font-size: var(--header-menu-size, 14px); font-weight: 500;
      border-radius: 8px; transition: background .15s;
      font-family: inherit;
    }
    .header-menu-item:hover { background: rgba(255,255,255,0.1); }
    [data-theme="light"] .header-menu-item:hover { background: rgba(0,0,0,0.06); }
    @media (max-width: 900px) {
      .header-menu { display: none; }
    }

    /* Пошук у шапці */
    .header-search {
      flex: 0 1 250px; min-width: 140px;
    }
    .header-search input {
      width: 100%; padding: 8px 12px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
      color: inherit; font-size: 14px; font-family: inherit;
    }
    [data-theme="light"] .header-search input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
    .header-search input::placeholder { color: inherit; opacity: 0.7; }
    .header-search input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    @media (max-width: 700px) {
      .header-search { display: none; }
    }

    /* Модалка для пунктів меню */
    .menu-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; padding: 20px;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .menu-modal {
      background: var(--card); border-radius: 14px;
      max-width: 600px; width: 100%; max-height: 85vh;
      overflow-y: auto; padding: 24px; position: relative;
      box-shadow: 0 12px 40px rgba(0,0,0,.3);
    }
    .menu-modal h3 { margin: 0 0 14px; color: var(--text); font-size: 22px; padding-right: 30px; }
    .menu-modal .content { color: var(--text); font-size: 15px; line-height: 1.6; }
    .menu-modal .content p { margin: 0 0 12px; }
    .menu-modal .content a { color: var(--accent); }
    .menu-modal .close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 22px; color: var(--muted); line-height: 1;
    }
    .menu-modal .close:hover { background: var(--bg); color: var(--text); }

    .cart-btn {
      position: relative; padding: 10px 16px; border-radius: 12px;
      background: var(--accent); color: var(--accent-text); border: none;
      cursor: pointer; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      transition: background .15s, transform .05s;
      box-shadow: 0 4px 12px rgba(11,138,255,.3);
    }
    .cart-btn:hover { background: var(--accent-dark); }
    .cart-btn:active { transform: scale(.97); }
    .cart-btn svg { width: 24px; height: 24px; }
    .cart-btn-text { font-size: 14px; }
    @media (max-width: 480px) {
      .cart-btn-text { display: none; }
    }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: #ef4444; color: #fff; border-radius: 12px;
      padding: 2px 7px; font-size: 11px; font-weight: 700;
      min-width: 22px; text-align: center; line-height: 1.2;
      border: 2px solid var(--topbar-bg, #fff);
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; zoom: var(--global-font-scale, 1); }
    .sub { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
    .sub.align-left { text-align: left; }
    .sub.align-center { text-align: center; }
    .sub.align-right { text-align: right; }
    h2.section-title { font-size: 22px; margin: 8px 0 14px; }
    .cat-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 16px; padding: 4px; }
    .cat-tab {
      padding: 8px 16px; border: 1.5px solid var(--border); background: var(--card); color: var(--text);
      border-radius: 999px; font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.15s ease; white-space: nowrap;
    }
    .cat-tab:hover { border-color: var(--accent); }
    .cat-tab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

    /* === Каталог-плитки === */
    .catalog {
      display: grid; gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }
    /* На мобільному за замовчуванням 1 колонка (бо minmax 180px), якщо ввімкнено 2 колонки — застосовуємо */
    @media (max-width: 599px) {
      .catalog.mobile-2col { grid-template-columns: 1fr 1fr; gap: 8px; }
      .catalog.mobile-2col .product img { aspect-ratio: 1; }
      .catalog.mobile-2col .name { font-size: 14px; }
      .catalog.mobile-2col .product { padding: 8px; }
    }
    @media (min-width: 600px) {
      .catalog { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    }
    .product {
      background: var(--card); border-radius: 12px;
      box-shadow: 0 2px 10px rgba(20,30,60,.06);
      overflow: hidden; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      display: flex; flex-direction: column;
    }
    .product:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(20,30,60,.12); }
    .product .img {
      aspect-ratio: 1; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: var(--muted); overflow: hidden; position: relative;
    }
    .product .img img { width: 100%; height: 100%; object-fit: cover; }
    /* #3: водяний знак (плитка по діагоналі) */
    .wm-overlay {
      position: absolute; inset: 0; pointer-events: none;
      background-repeat: repeat; z-index: 1;
    }
    .product .body {
      padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 8px;
    }
    .product .name { font-size: 14px; font-weight: 600; line-height: 1.3; flex: 1; overflow-wrap: anywhere; word-break: break-word; }
    .product .price { font-size: 16px; font-weight: 700; color: var(--text); }
    .product .add {
      padding: 8px 12px; background: var(--accent); color: var(--accent-text);
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 600; width: 100%;
      -webkit-user-select: none; user-select: none;
    }
    .product .add:hover { background: var(--accent-dark); }
    .product .add.in-cart { background: var(--success); }
    /* Анімація зникнення при видаленні з кошика */
    .product .add.removing-anim {
      transition: transform .25s ease, opacity .25s ease, background-color .25s ease;
      transform: scale(0.85);
      opacity: 0.4;
      background: #ef4444;
    }
    .product .video-mark {
      position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.7);
      color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 4px;
    }
    .product .img-wrap { position: relative; }
    .product-badges {
      position: absolute; top: 6px; left: 6px;
      display: flex; flex-direction: column; gap: 4px; align-items: flex-start;
      z-index: 2;
    }
    .product-badge {
      font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2); text-transform: uppercase; letter-spacing: 0.3px;
    }
    .product .sold {
      font-size: 11px; color: var(--muted); margin-top: -4px;
    }

    /* Боковые баннеры — стек з кількох карток */
    .side-banner-stack {
      position: fixed; top: 80px;
      width: var(--banner-width, 180px);
      max-width: calc((100vw - 1200px) / 2 - 24px);
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 30;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      box-sizing: border-box;
    }
    .side-banner-stack.show { display: flex; }
    .side-banner-stack.left { left: 12px; }
    .side-banner-stack.right { right: 12px; }
    /* Карусель режим: тільки 1 видимий, інші позиціоновані абсолютно */
    .side-banner-stack.carousel {
      position: fixed;
      overflow: hidden;
      max-height: 400px;
    }
    .side-banner-stack.carousel .side-banner-item {
      position: absolute;
      top: 0; left: 0; right: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
      opacity: 0;
      pointer-events: none;
    }
    .side-banner-stack.carousel .side-banner-item.active {
      opacity: 1;
      pointer-events: auto;
      position: relative;
    }
    .side-banner-stack.carousel.fx-slide-left .side-banner-item { transform: translateX(100%); opacity: 1; }
    .side-banner-stack.carousel.fx-slide-left .side-banner-item.active { transform: translateX(0); }
    .side-banner-stack.carousel.fx-slide-left .side-banner-item.exiting { transform: translateX(-100%); position: absolute; opacity: 1; }
    .side-banner-stack.carousel.fx-slide-right .side-banner-item { transform: translateX(-100%); opacity: 1; }
    .side-banner-stack.carousel.fx-slide-right .side-banner-item.active { transform: translateX(0); }
    .side-banner-stack.carousel.fx-slide-right .side-banner-item.exiting { transform: translateX(100%); position: absolute; opacity: 1; }
    .side-banner-stack.carousel.fx-instant .side-banner-item { transition: none; }
    .side-banner-stack::-webkit-scrollbar { width: 6px; }
    .side-banner-stack::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    .side-banner-item {
      width: 100%;
      padding: 12px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(20,30,60,.1);
      box-sizing: border-box;
    }
    .side-banner-item img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .side-banner-item .text {
      font-size: 12px; line-height: 1.4; margin-top: 8px; color: var(--text);
      word-break: break-word; overflow-wrap: break-word;
      white-space: pre-wrap;
    }
    .side-banner-item a { display: block; text-decoration: none; color: inherit; }
    .banner-video {
      position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 8px;
      overflow: hidden; cursor: pointer; background: #000;
    }
    .banner-video img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .banner-video .play-icon {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .banner-video .play-icon::before {
      content: ''; width: 0; height: 0;
      border-left: 22px solid #fff; border-top: 14px solid transparent; border-bottom: 14px solid transparent;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.5));
      margin-left: 4px;
    }
    .banner-video::after {
      content: ''; position: absolute; inset: 0; background: rgba(0,0,0,.25);
      transition: background .15s;
    }
    .banner-video:hover::after { background: rgba(0,0,0,.1); }
    .video-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .video-modal-close {
      position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,.15);
      color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; font-size: 20px;
    }
    .video-modal-content {
      width: 100%; max-width: 900px; aspect-ratio: 16/9; max-height: 80vh;
      background: #000; border-radius: 12px; overflow: hidden;
    }
    .video-modal-content iframe, .video-modal-content video {
      width: 100%; height: 100%; border: 0;
    }
    /* Ховаємо банери коли доступного місця замало:
       1200px (wrap) + 2×(banner-width + 24px gap) > 100vw → ховаємо
       Через calc: якщо max-width вийшов <140px, банер ховається */
    @media (max-width: 1500px) {
      .side-banner-stack { display: none !important; }
    }

    /* === Hero-банер під шапкою === */
    .hero-banner {
      display: block;
      width: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
    }
    /* Слайди для каруселі */
    .hero-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }
    .hero-slide.active {
      opacity: 1;
      pointer-events: auto;
    }
    /* Slide-left: новий заїжджає справа, старий йде вліво */
    .hero-banner.fx-slide-left .hero-slide { transform: translateX(100%); opacity: 1; }
    .hero-banner.fx-slide-left .hero-slide.active { transform: translateX(0); }
    .hero-banner.fx-slide-left .hero-slide.exiting { transform: translateX(-100%); }
    /* Slide-right: новий заїжджає зліва, старий йде вправо */
    .hero-banner.fx-slide-right .hero-slide { transform: translateX(-100%); opacity: 1; }
    .hero-banner.fx-slide-right .hero-slide.active { transform: translateX(0); }
    .hero-banner.fx-slide-right .hero-slide.exiting { transform: translateX(100%); }
    /* Instant — без анімації */
    .hero-banner.fx-instant .hero-slide { transition: none; }
    .hero-banner-overlay {
      position: absolute; inset: 0;
      pointer-events: none;
    }
    .hero-banner-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      box-sizing: border-box;
    }
    .hero-banner-text {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 16px 20px;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    @media (max-width: 700px) {
      .hero-banner-text { font-size: 18px; padding: 12px 16px; }
    }

    /* === Промоблок на головній === */
    .home-promo { width: 100%; box-sizing: border-box; padding: 6px 12px; }
    .home-promo-inner { display: flex; flex-wrap: wrap; gap: 0.5em; align-items: center; }
    .home-promo-chip {
      display: inline-flex; align-items: center; gap: 0.4em; border: none; cursor: pointer;
      font-weight: 700; font-size: 1em; line-height: 1.1; font-family: inherit;
      border-radius: 999px; padding: 0.6em 1.05em; box-shadow: 0 2px 6px rgba(0,0,0,.14);
      transition: transform .1s ease, opacity .15s ease; white-space: nowrap;
    }
    .home-promo-chip:hover { transform: translateY(-1px); opacity: .92; }
    .home-promo-chip:active { transform: translateY(0); }

    /* === Модалка товара === */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      opacity: 0; pointer-events: none; transition: opacity .2s;
      z-index: 200;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal {
      position: fixed; inset: 0; z-index: 210;
      display: flex; align-items: center; justify-content: center;
      padding: 16px; pointer-events: none;
    }
    .modal-content {
      background: var(--card); color: var(--text);
      border-radius: 14px; max-width: 900px; width: 100%;

      transition: transform .25s, opacity .25s;
      pointer-events: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);

    }
    .modal-overlay.show ~ .modal .modal-content,
    .modal.show .modal-content { transform: translateY(0); opacity: 1; }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      width: 36px; height: 36px; border-radius: 50%;

    .modal-close:hover { background: rgba(0,0,0,.8); }

    .modal-grid {

    }
    @media (min-width: 700px) {
      .modal-grid { grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr); }

    /* Режим повної сторінки товару (productPageMode === 'page') */
    .back-to-catalog {
      background: var(--card, #fff); color: var(--text); border: 1px solid var(--border, #e5e7eb);

    }
    .back-to-catalog:hover { background: var(--bg); }

    .gallery .main-img img { width: 100%; height: 100%; object-fit: contain; background: var(--card); }

    /* #4: підпис до фото в галереї */
    .gallery .img-caption {

    .gallery .video-thumb {

    /* Информация */

    .info h2 { margin: 0; font-size: 22px; line-height: 1.3; overflow-wrap: anywhere; word-break: break-word; }
    /* щоб довга назва переносилась на 2 рядок і не залазила під хрестик закриття */

    .info .attrs {

    .qty-ctrl { display: flex; align-items: center; gap: 6px; }
    .qty-ctrl button {
      width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--card); color: var(--text);
      cursor: pointer; font-size: 18px; font-weight: 600;

    .qty-ctrl .qty-val { min-width: 36px; text-align: center; font-weight: 700; font-size: 16px; }

    .cart-overlay {

    .cart-overlay.show { opacity: 1; pointer-events: auto; }
    .cart-panel {

    .cart-item:last-child { border-bottom: none; }
    .cart-item .thumb {

    .cart-item .info-c { flex: 1; min-width: 0; }
    .cart-item .name { font-weight: 600; font-size: 14px; }

    .cart-empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .cart-footer {
      padding: 14px 16px; border-top: 1px solid var(--border); background: var(--bg);

    .cart-total { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; }

    .checkout-btn {
      width: 100%; padding: 14px; background: var(--accent); color: var(--accent-text);

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 16px; }

    .contacts-card a { color: var(--accent); text-decoration: none; }
    .contacts-card a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div id="app"><div class="loading">Завантаження магазину…</div></div>

<!-- Корзина -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart(false)"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3 id="cartTitle">🛒 Кошик</h3>
    <button class="cart-close-btn" onclick="toggleCart(false)">×</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-promo" id="cartPromoBox" style="display:none; margin-bottom:10px;">
      <div style="display:flex; gap:6px; align-items:stretch;">
        <input type="text" id="cartPromoInput" placeholder="🎟 Промокод" autocomplete="off"
          style="flex:1; padding:9px 11px; border:1px solid #e5e7eb; border-radius:8px; font-size:14px; text-transform:uppercase;"
          oninput="this.value=this.value.toUpperCase()" onclick="pastePromoOnClick(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();applyCartPromo();}" />
        <button type="button" onclick="applyCartPromo()"
          style="padding:0 14px; border:1px solid #e5e7eb; border-radius:8px; background:#f3f4f6; font-weight:600; cursor:pointer; font-size:13px;">Застосувати</button>
      </div>
      <div id="cartPromoStatus" style="margin-top:6px; font-size:13px;"></div>
    </div>
    <div class="cart-total"><span id="cartTotalLabel">Разом:</span><span class="v" id="cartTotal">0 ₴</span></div>
    <a class="checkout-btn" id="checkoutBtn" href="/checkout/">Оформити замовлення</a>
  </div>
</div>

<!-- Модалка товара -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="modal" style="display:none;">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="/_richtext-sanitize.js"></script>
<script>
const CART_KEY = 'sotosprint_cart_v1';
let shop = null;
let currentProduct = null;

// #3: водяний знак — один глобальний текст, плитка по діагоналі. Малюємо SVG-патерн (data-URI).
function watermarkBg() {
  if (!shop.watermarkEnabled || !shop.watermarkText) return '';
  const text = String(shop.watermarkText)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
  const size = parseInt(shop.watermarkSize) || 22;
  let op = (shop.watermarkOpacity != null && shop.watermarkOpacity !== '') ? parseFloat(shop.watermarkOpacity) : 0.22;
  if (!(op >= 0 && op <= 1)) op = 0.22;
  // розмір плитки залежить від довжини тексту
  const tile = Math.max(140, Math.round(String(shop.watermarkText).length * size * 0.85));
  const cy = Math.round(tile / 2);
  // два шари (темний зсув + білий) — читабельно і на світлих, і на темних фото
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${tile}' height='${tile}'>`
    + `<g transform='rotate(-30 ${cy} ${cy})' font-family='Arial, sans-serif' font-size='${size}' font-weight='700'>`
    + `<text x='6' y='${cy + 1}' fill='rgba(0,0,0,${(op * 0.7).toFixed(3)})'>${text}</text>`
    + `<text x='5' y='${cy}' fill='rgba(255,255,255,${op.toFixed(3)})'>${text}</text>`
    + `</g></svg>`;
  // ВАЖЛИВО: весь рядок підставляється у style="..." (HTML-атрибут з подвійними
  // лапками), тому обгортка url() має бути в ОДИНАРНИХ лапках. АЛЕ сам SVG теж
  // містить одинарні лапки (xmlns='...', x='..'), і encodeURIComponent їх НЕ кодує —
  // вони б розірвали url('...'). Тому додатково кодуємо ' → %27.
  const enc = encodeURIComponent(svg).replace(/'/g, '%27');
  return `url('data:image/svg+xml,${enc}')`;
}
function wmOverlayHtml() {
  const bg = watermarkBg();
  return bg ? `<div class="wm-overlay" style="background-image:${bg}"></div>` : '';
}
// #4b: шильдик (бейдж) поверх конкретного фото в модалці — текст = підпис фото.
// Колір фону / тексту / розмір беремо з самого фото (capBg, capColor, capSize).
function imgBadgeHtml(img) {
  if (!img || !img.caption) return '';
  let style = '';
  if (img.capBg && /^#[0-9a-f]{3,8}$/i.test(img.capBg)) style += `background:${img.capBg};`;
  if (img.capColor && /^#[0-9a-f]{3,8}$/i.test(img.capColor)) style += `color:${img.capColor};`;
  const sz = parseInt(img.capSize);
  if (sz >= 8 && sz <= 48) style += `font-size:${sz}px;`;
  return `<div class="img-badge"${style ? ` style="${style}"` : ''}>${escapeHtml(img.caption)}</div>`;
}

// 💰 Оптова ціна від кількості: повертає ціну за 1 шт для заданої кількості.
// Береться поріг з найбільшим minQty, що ≤ qty; інакше базова p.price.
function tierUnitPrice(p, qty) {
  const base = (p && p.price) || 0;
  if (!p || !p.qtyPricing || !Array.isArray(p.qtyTiers)) return base;
  const q = parseInt(qty, 10) || 1;
  let price = base, bestMin = 1;
  for (const t of p.qtyTiers) {
    const mq = parseInt(t.minQty, 10);
    const pr = parseFloat(t.price);
    if (!Number.isFinite(mq) || mq < 2 || !Number.isFinite(pr) || pr < 0) continue;
    if (q >= mq && mq >= bestMin) { bestMin = mq; price = pr; }
  }
  return price;
}
// Сумарна надбавка за обрані варіанти у позиції кошика.
function itemOptDelta(item) {
  if (!Array.isArray(item.optionItems)) return 0;
  return item.optionItems.reduce((s, oi) => s + (parseFloat(oi.priceDelta) || 0), 0);
}
// Перерахунок unitPrice позиції з урахуванням оптових порогів + надбавок.
function recomputeItemPrice(item) {
  const p = (shop.products || []).find(x => x.id === item.productId);
  if (!p) return;
  item.unitPrice = tierUnitPrice(p, item.quantity) + itemOptDelta(item);
}
// Підказка з оптовими порогами (для модалки).
function tierHintHtml(p, cur) {
  if (!p || !p.qtyPricing || !Array.isArray(p.qtyTiers)) return '';
  const tiers = p.qtyTiers
    .map(t => ({ mq: parseInt(t.minQty, 10), pr: parseFloat(t.price) }))
    .filter(t => Number.isFinite(t.mq) && t.mq >= 2 && Number.isFinite(t.pr) && t.pr >= 0)
    .sort((a, b) => a.mq - b.mq);
  if (!tiers.length) return '';
  const parts = tiers.map(t => `від ${t.mq} шт — ${t.pr} ${cur}`);
  return `<div class="tier-hint" style="font-size:13px; color:#16a34a; font-weight:600; margin:4px 0;">💰 Опт: ${parts.join(' · ')}</div>`;
}

// #2: наявність товару. showStock=true → показуємо залишок; stock<=0 → немає в наявності.
function stockInfo(p) {
  const tracked = !!(p && p.showStock);
  const qty = Number.isFinite(p && p.stock) ? p.stock : 0;
  return { tracked, qty, out: tracked && qty <= 0 };
}

// === PWA: вмикається/вимикається з адмінки (shop.pwaEnabled) ===
// enabled=true  → реєструємо service worker, ставимо theme-color, показуємо власну кнопку «Встановити».
// enabled=false → знімаємо SW з реєстрації, чистимо кеші, прибираємо manifest-лінк.
// Manifest-лінк стоїть статично в <head> (Chrome бачить його одразу). При вимкненому PWA
// сам /manifest.webmanifest віддає 404, тож браузер його ігнорує.
let _deferredInstallPrompt = null;

function showInstallButton() {
  if (document.getElementById('pwaInstallBtn')) return;
  const btn = document.createElement('button');
  btn.id = 'pwaInstallBtn';
  btn.type = 'button';
  btn.textContent = '📲 Встановити застосунок';
  btn.style.cssText = 'position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:6000;' +
    'background:var(--accent,#0b8aff);color:#fff;border:none;border-radius:24px;padding:12px 22px;' +
    'font-size:15px;font-weight:700;box-shadow:0 6px 20px rgba(11,138,255,.45);cursor:pointer;';
  btn.onclick = async () => {
    if (!_deferredInstallPrompt) return;
    btn.disabled = true;
    _deferredInstallPrompt.prompt();
    try { await _deferredInstallPrompt.userChoice; } catch (_) {}
    _deferredInstallPrompt = null;
    btn.remove();
  };
  document.body.appendChild(btn);
}

async function setupPWA(enabled) {
  if (!('serviceWorker' in navigator)) return;

  if (enabled) {
    // theme-color з налаштувань
    if (shop.pwaThemeColor) {
      document.querySelector('meta[name="theme-color"]')?.setAttribute('content', shop.pwaThemeColor);
    }
    // Власна іконка застосунку — також для iOS (додавання на головний екран)
    if (shop.pwaIconImage) {
      document.querySelector('link[rel="apple-touch-icon"]')?.setAttribute('href', shop.pwaIconImage);
    }
    // Встановлення з браузера вимкнено: прибираємо manifest — зникає і наша кнопка,
    // і пункт «Встановити застосунок» у меню браузера. SW лишається (кеш/офлайн).
    if (shop.pwaInstallButtonEnabled === false) {
      document.querySelector('link[rel="manifest"]')?.remove();
    }
    // реєстрація service worker
    try { await navigator.serviceWorker.register('/sw.js'); } catch (_) {}

    // Власна кнопка встановлення: Chrome кидає подію beforeinstallprompt, коли сайт
    // відповідає критеріям. Перехоплюємо її й показуємо свою кнопку (зручніше, ніж шукати в меню).
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      _deferredInstallPrompt = e;
      // Якщо вже встановлено як застосунок — кнопку не показуємо.
      // Окремий тумблер pwaInstallButtonEnabled: можна сховати кнопку, лишивши установку через меню браузера.
      if (shop.pwaInstallButtonEnabled !== false && !window.matchMedia('(display-mode: standalone)').matches) showInstallButton();
    });
    window.addEventListener('appinstalled', () => {
      _deferredInstallPrompt = null;
      document.getElementById('pwaInstallBtn')?.remove();
    });
  } else {
    // Вимкнено — повне прибирання, щоб у клієнтів, які вже встановили, фіча відключилась
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map((r) => r.unregister()));
    } catch (_) {}
    try {
      if (window.caches) {
        const keys = await caches.keys();
        await Promise.all(keys.filter((k) => k.startsWith('agprnt-')).map((k) => caches.delete(k)));
      }
    } catch (_) {}
    document.querySelector('link[rel="manifest"]')?.remove();
    document.getElementById('pwaInstallBtn')?.remove();
  }
}

      <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Телефон</label>
      <input id="tmPhone" type="tel" inputmode="tel" placeholder="${escapeAttr(shop.trackPhonePlaceholder || 'напр. 0991234567')}" style="width:100%;box-sizing:border-box;padding:11px 13px;font-size:16px;border:1px solid var(--border,#e5e7eb);border-radius:10px;margin-bottom:14px" />
      <button id="tmSubmit" type="button" style="width:100%;padding:12px;font-size:16px;font-weight:700;color:#fff;background:var(--accent,#0b8aff);border:none;border-radius:10px;cursor:pointer">Перевірити статус</button>
      <div id="tmErr" style="display:none;margin-top:14px;padding:11px 13px;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:10px;font-size:14px"></div>
      <div id="tmResult" style="display:none;margin-top:16px"></div>
    </div>`;
  document.body.appendChild(ov);

  const close = () => ov.remove();
  ov.addEventListener('click', e => { if (e.target === ov) close(); });
  document.getElementById('trackClose').onclick = close;

  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtDate = iso => { try { return new Date(iso).toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric' }); } catch { return ''; } };
  const errBox = document.getElementById('tmErr');
  const result = document.getElementById('tmResult');
  const btn = document.getElementById('tmSubmit');

  // Захист від неправильного номера телефону (як на сторінці /track):
  // 0XXXXXXXXX (10 цифр) або +380XXXXXXXXX / 380XXXXXXXXX (12 цифр)
  const tmPhone = document.getElementById('tmPhone');
  const tmPhoneErr = document.createElement('div');
  tmPhoneErr.style.cssText = 'display:none;color:#b91c1c;font-size:13px;margin:-8px 0 12px';
  tmPhoneErr.textContent = 'Перевірте номер — має бути 0XXXXXXXXX (10 цифр) або +380XXXXXXXXX';
  tmPhone.insertAdjacentElement('afterend', tmPhoneErr);
  const tmPhoneValid = () => {
    const d = tmPhone.value.replace(/\D/g, '');
    return (d.length === 10 && d.startsWith('0')) || (d.length === 12 && d.startsWith('380'));
  };
  const tmSetPhoneErr = on => {
    tmPhoneErr.style.display = on ? 'block' : 'none';
    tmPhone.style.borderColor = on ? '#dc2626' : 'var(--border,#e5e7eb)';
  };
  tmPhone.addEventListener('keydown', e => {
    if (e.key.length === 1 && !/[\d+\s()\-]/.test(e.key)) e.preventDefault();
  });
  tmPhone.addEventListener('input', () => {
    const v = tmPhone.value.replace(/[^\d+\s()\-]/g, '').slice(0, 20);
    if (tmPhone.value !== v) tmPhone.value = v;
    if (tmPhoneValid()) tmSetPhoneErr(false);
  });
  tmPhone.addEventListener('blur', () => {
    const d = tmPhone.value.replace(/\D/g, '');
    tmSetPhoneErr(d.length > 0 && !tmPhoneValid());
  });

  btn.onclick = async () => {
    errBox.style.display = 'none'; result.style.display = 'none';

    if (!orderId || !phone) { errBox.textContent = 'Заповніть обидва поля.'; errBox.style.display = 'block'; return; }
    if (!tmPhoneValid()) { tmSetPhoneErr(true); tmPhone.focus(); return; }

      if (!data.ok) { errBox.textContent = data.error || 'Не вдалося отримати статус.'; errBox.style.display = 'block'; }

        const row = (k, v) => `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border,#e5e7eb);font-size:14px"><span style="color:var(--muted,#6b7280)">${k}</span><span style="font-weight:600;text-align:right">${v}</span></div>`;
        html += row('Замовлення', '#' + esc(o.id));
        if (o.createdAt) html += row('Оформлено', esc(fmtDate(o.createdAt)));
        if (o.itemsCount != null) html += row('Кількість', esc(o.itemsCount) + ' шт');
        if (o.totalPrice != null) html += row('Сума', esc(o.totalPrice) + ' ₴');
        if (o.delivery) html += row('Доставка', esc(o.delivery));
        if (o.np) {
          html += `<div style="margin-top:14px;padding:13px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px"><h3 style="margin:0 0 6px;font-size:15px;color:var(--accent-dark,#0670d9)">🚚 Нова Пошта</h3>`;
          html += row('Статус посилки', esc(o.np.status || '—'));
          if (o.np.warehouse) html += row('Відділення', esc(o.np.warehouse));
          if (o.np.actualDelivery) html += row('Доставлено', esc(o.np.actualDelivery));
          if (o.ttn) html += row('ТТН', esc(o.ttn));
          html += `</div>`;
        } else if (o.hasTtn) {
          html += `<p style="margin-top:12px;color:var(--muted,#6b7280);font-size:13px">Посилку передано Новій Пошті, статус оновлюється.</p>`;
        }
        result.innerHTML = html; result.style.display = 'block';
      }
    } catch (_) { errBox.textContent = 'Мережа недоступна. Спробуйте ще раз.'; errBox.style.display = 'block'; }
    finally { btn.disabled = false; btn.textContent = 'Перевірити статус'; }
  };
}

(async () => {
  // Лічильник відвідувачів (fire-and-forget, не блокує завантаження сайту)
  fetch('/api/visit', { credentials: 'include' }).catch(() => {});
  try {
    const r = await fetch('/api/shop?t=' + Date.now(), { cache: 'no-store' });
    shop = await r.json();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">Не удалось загрузить магазин. Проверьте интернет.</div>';
    return;
  }
  // Назва вкладки браузера: окреме поле browserTabTitle, або seoTitle, або обчислюється з title
  document.title = shop.browserTabTitle || shop.seoTitle || stripEmoji(titlePlain(shop.title || '')) || 'Магазин';

  // Режим прев'ю для адміна: ?preview=1 + валідна адмін-сесія (перевіряємо на сервері,
  // бо кука admin_session — HttpOnly і JS її не бачить).
  let _isPreview = false;
  if (shop.shopEnabled === false && new URLSearchParams(location.search).get('preview') === '1') {
    try {
      const me = await fetch('/api/admin/me', { credentials: 'include' });
      _isPreview = me.ok;
    } catch { _isPreview = false; }
  }
  if (shop.shopEnabled === false && !_isPreview) {
    document.getElementById('app').innerHTML = `
      <div class="topbar"><h1>${renderTitle(shop.title || '')}</h1></div>
      <div class="wrap">
        <div class="closed-card">${escapeHtml(shop.shopDisabledMessage || '🚫 Магазин закритий')}</div>
      </div>
    `;
    return;
  }
  // Банер-нагадування адміну, що магазин закритий, а він дивиться в режимі прев'ю.
  if (shop.shopEnabled === false && _isPreview) {
    const b = document.createElement('div');
    b.style.cssText = 'position:sticky;top:0;z-index:5000;background:#fef3c7;color:#92400e;text-align:center;padding:8px 12px;font-size:13px;font-weight:600;border-bottom:1px solid #fde68a;';
    b.textContent = '👁 Режим перегляду адміна — магазин ЗАКРИТИЙ для клієнтів';
    document.body.insertBefore(b, document.body.firstChild);
  }

  renderShop();
  renderCart();

  // === PWA (встановлюваний застосунок) — керується тумблером shop.pwaEnabled з адмінки ===
  setupPWA(shop.pwaEnabled === true).catch(() => {});

  // === Відстеження замовлення — кнопка на вітрині (тумблери в адмінці) ===
  if (shop.orderTrackingEnabled === true && shop.trackButtonEnabled !== false) {
    setupOrderTracking();
  }

  // Відкрити товар за URL: /product/ID (повна сторінка) або ?product=ID (зворотна сумісність)
  const pathMatch = location.pathname.match(/^\/product\/([^/]+)\/?$/);
  const pid = pathMatch ? decodeURIComponent(pathMatch[1]) : new URL(location).searchParams.get('product');
  if (pid) {
    const p = shop.products.find(x => x.id === pid);
    if (p) {
      // Якщо зайшли прямо на /product/ID — показуємо сторінку; ?product=ID поважає режим.
      // openModal(p, false) — без pushState, щоб «назад» не виходив із сайту при прямому вході.
      if (pathMatch || shop.productPageMode === 'page') openProductPage(p);
      else openModal(p, false);
    } else if (pathMatch) {
      // Невідомий товар на /product/... — повертаємо в каталог
      history.replaceState({}, '', '/');
    }
  }
  // Закрытие модалки клавишей ESC
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Auto-refresh: когда юзер возвращается на вкладку — тихо обновляем данные магазина.
  // Не дёргаем если открыта модалка или корзина.
  let lastRefresh = Date.now();
  let lastShopHash = JSON.stringify(shop);
  let lastShopVersion = '';
  async function maybeRefresh() {
    if (document.visibilityState !== 'visible') return;
    if (Date.now() - lastRefresh < 3000) return;
    lastRefresh = Date.now();
    try {
      // Спершу — лайтова перевірка версії
      const vr = await fetch('/api/shop-version', { cache: 'no-store' });
      const vd = await vr.json();
      if (vd.v && vd.v === lastShopVersion) return; // нічого не змінилось
      lastShopVersion = vd.v;

      // Версія змінилась — тягнемо повні дані
      const r = await fetch('/api/shop?t=' + Date.now(), { cache: 'no-store' });
      const newShop = await r.json();
      const newHash = JSON.stringify(newShop);
      if (newHash !== lastShopHash) {
        shop = newShop;
        lastShopHash = newHash;
        if (shop.shopEnabled === false) { location.reload(); return; }
        // Якщо відкрито товар (модалка/сторінка) — оновлюємо його тексти НА МІСЦІ
        // (опис/назва/ціна), не чіпаючи вибрані варіанти й кількість і не перемальовуючи
        // каталог під ним. Так редагування опису в адмінці видно одразу без перезавантаження.
        if (currentProduct) {
          const fresh = (shop.products || []).find(x => x.id === currentProduct.id);
          if (fresh) { currentProduct = fresh; updateOpenProductFields(fresh); }
          return; // каталог під модалкою/сторінкою не чіпаємо
        }
        renderShop();
      }
    } catch {}
  }
  window.addEventListener('focus', maybeRefresh);
  document.addEventListener('visibilitychange', maybeRefresh);
  // Періодична перевірка кожні 30 сек (на випадок коли користувач сидить на сторінці)
  setInterval(maybeRefresh, Math.max(1, Math.min(60, parseInt(shop.publicPollIntervalSec, 10) || 5)) * 1000);
})();

  return params.get('category') || '';
}
// Ефективна активна категорія: якщо в URL нічого немає І вкладку «Усі товари» вимкнено —
// за замовчуванням відкриваємо ПЕРШУ категорію (а не порожню сторінку).
function getEffectiveCategoryId() {
  const active = getActiveCategoryId();
  if (active) return active;
  const showAllTab = shop.showAllCategoriesTab !== false;
  const cats = Array.isArray(shop.categories) ? shop.categories.filter(c => c.name && c.slug && !c.hidden) : [];
  if (!showAllTab && cats.length > 0) return cats[0].slug;
  return '';
}
function setActiveCategory(slug) {
  const url = new URL(location.href);
  if (slug) url.searchParams.set('category', slug);
  else url.searchParams.delete('category');
  history.pushState({}, '', url);
  renderShop();
}
window.addEventListener('popstate', (ev) => {
  // Якщо відкрито кошик — «назад» спершу закриває його (а не виходить із сайту)
  if (document.getElementById('cartPanel')?.classList.contains('show')) {
    doCloseCartDom();
    return;
  }
  // Повна сторінка товару /product/ID
  const m = location.pathname.match(/^\/product\/([^/]+)\/?$/);
  if (m) {
    const p = (shop.products || []).find(x => x.id === decodeURIComponent(m[1]));
    if (p) { openProductPage(p); return; }
  }
  // Повернулись/перейшли на стан модалки (?product= з history.state.modal) — відкриваємо модалку
  const st = ev.state;
  if (st && st.modal) {
    const p = (shop.products || []).find(x => x.id === st.modal);
    if (p) { openModal(p, false); return; }
  }
  // Інакше — закриваємо модалку (якщо була) і показуємо каталог
  if (document.getElementById('modal')?.classList.contains('show')) {
    doCloseModalDom();
    return; // каталог уже відрендерений під модалкою — зайвий renderShop не потрібен
  }
  currentProduct = null;
  document.body.style.overflow = '';
  renderShop();
});

function renderCategoriesNav() {
  const cats = Array.isArray(shop.categories) ? shop.categories.filter(c => c.name && c.slug && !c.hidden) : [];
  if (!shop.showCategoriesNav || cats.length === 0) return '';
  const active = getEffectiveCategoryId();
  const allLabel = shop.defaultCategoryName || 'Усі товари';
  const showAllTab = shop.showAllCategoriesTab !== false;
  const tabs = [...(showAllTab ? [{ slug: '', name: allLabel }] : []), ...cats]
    .map(c => `<button class="cat-tab ${(c.slug === active) ? 'active' : ''}" onclick="setActiveCategory('${escapeAttr(c.slug)}')">${escapeHtml(c.name)}</button>`)
    .join('');
  return `<div class="cat-nav">${tabs}</div>`;
}

function renderShop() {
  // Повернулись у каталог — повертаємо плаваючу кнопку «Відстежити замовлення» (її ховає сторінка товару)
  const trackFab = document.getElementById('trackFab');
  if (trackFab) trackFab.style.display = '';
  // Спершу валідуємо кошик: видаляємо товари яких більше немає чи вимкнуті
  validateCart();
  // Динамічне оновлення SEO з settings.
  // Назва вкладки браузера: browserTabTitle (якщо задано) > seoTitle > shop.title
  if (shop.seoTitle) {
    // OG/Twitter завжди беремо seoTitle (для соцмереж)
    document.querySelector('meta[property="og:title"]')?.setAttribute('content', shop.seoTitle);
    document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', shop.seoTitle);
    // Назва вкладки — лише якщо не задано browserTabTitle
    if (!shop.browserTabTitle) {
      document.title = shop.seoTitle;
    }
  }
  if (shop.seoDescription) {
    document.querySelector('meta[name="description"]')?.setAttribute('content', shop.seoDescription);
    document.querySelector('meta[property="og:description"]')?.setAttribute('content', shop.seoDescription);
    document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', shop.seoDescription);
  }
  if (shop.seoKeywords) {
    document.querySelector('meta[name="keywords"]')?.setAttribute('content', shop.seoKeywords);
  }
  if (shop.seoOgImage) {
    document.querySelector('meta[property="og:image"]')?.setAttribute('content', shop.seoOgImage);
    document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', shop.seoOgImage);
  }
  if (shop.seoGoogleVerification) {
    let m = document.querySelector('meta[name="google-site-verification"]');
    if (!m) {
      m = document.createElement('meta');
      m.setAttribute('name', 'google-site-verification');
      document.head.appendChild(m);
    }
    // Принимаем как полный мета-тэг (`google-site-verification=XXX`) так и просто значение
    const v = String(shop.seoGoogleVerification).replace(/^google-site-verification=?/, '').trim();
    m.setAttribute('content', v);
  }
  // Favicon (іконка у вкладці браузера)
  if (shop.faviconImage) {
    let icon = document.querySelector('link[rel="icon"]');
    if (!icon) { icon = document.createElement('link'); icon.rel = 'icon'; document.head.appendChild(icon); }
    icon.href = shop.faviconImage;
  }

  // Аналітика — додаємо скрипти один раз
  if (shop.googleAnalyticsId && !window.__gaLoaded) {
    window.__gaLoaded = true;
    const s = document.createElement('script');
    s.async = true;
    s.src = `https://www.googletagmanager.com/gtag/js?id=${shop.googleAnalyticsId}`;
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.gtag = gtag;
    gtag('js', new Date());
    gtag('config', shop.googleAnalyticsId);
  }
  if (shop.googleTagManagerId && !window.__gtmLoaded) {
    window.__gtmLoaded = true;
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer',shop.googleTagManagerId);
  }
  if (shop.facebookPixelId && !window.__fbpLoaded) {
    window.__fbpLoaded = true;
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', shop.facebookPixelId);
    fbq('track', 'PageView');
  }
  document.getElementById('cartTitle').textContent = shop.cartTitle || '🛒 Кошик';
  document.getElementById('cartTotalLabel').textContent = shop.cartTotalLabel || 'Разом:';
  let products = shop.products || [];
  // Фільтр пошуку (якщо задано — пріоритет над категорією)
  const q = String(window.searchQuery || '').trim().toLowerCase();
  if (q.length >= 2) {
    products = products.filter(p => {
      const haystack = [
        p.name, p.description,
        ...(p.attributes || []).map(a => `${a.label} ${a.value}`),
        ...(p.options || []).map(o => o.name),
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    });
  } else {
    // Фільтр по категорії (тільки якщо немає пошуку).
    // getEffectiveCategoryId() сам підставляє першу категорію, коли вкладку «Усі» вимкнено.
    const active = getEffectiveCategoryId();
    const cat = active ? (shop.categories || []).find(c => c.slug === active) : null;
    if (cat && !cat.hidden) {
      products = products.filter(p => p.categoryId === cat.id);
    } else {
      // Вкладка «Усі товари»: ховаємо товари прихованих категорій (товар лишається з categoryId).
      const hiddenIds = (shop.categories || []).filter(c => c.hidden).map(c => c.id);
      if (hiddenIds.length) products = products.filter(p => !hiddenIds.includes(p.categoryId));
    }
  }
  const productsHtml = products.length === 0
    ? `<p class="sub" style="text-align:center; padding:40px 0;">${q.length >= 2 ? `Нічого не знайдено за запитом «${escapeHtml(q)}»` : (getEffectiveCategoryId() ? 'У цій категорії поки що немає товарів.' : 'Каталог поки порожній. Загляньте пізніше.')}</p>`
    : `<div class="catalog${shop.mobileTwoColumns ? ' mobile-2col' : ''}">${products.map(productCardHtml).join('')}</div>`;

  // Тема
  document.documentElement.setAttribute('data-theme', shop.theme === 'dark' ? 'dark' : 'light');

  // Цвет шапки и контраст текста
  if (shop.topbarBg) {
    document.documentElement.style.setProperty('--topbar-bg', shop.topbarBg);
    const textColor = shop.topbarTextColorOverride || getReadableTextColor(shop.topbarBg);
    document.documentElement.style.setProperty('--topbar-text', textColor);
  }
  if (shop.topbarBgImage) {
    document.documentElement.style.setProperty('--topbar-bg-image', `url("${shop.topbarBgImage}")`);
    if (shop.topbarTextColorOverride) {
      document.documentElement.style.setProperty('--topbar-text', shop.topbarTextColorOverride);

  } else {
    document.documentElement.style.setProperty('--topbar-bg-image', 'none');

  if (shop.topbarTitleSize) document.documentElement.style.setProperty('--topbar-title-size', shop.topbarTitleSize + 'px');
  // Ширина бічних банерів
  const bw = parseInt(shop.bannerWidth, 10);
  if (bw >= 140 && bw <= 280) {
    document.documentElement.style.setProperty('--banner-width', bw + 'px');
  } else {
    document.documentElement.style.setProperty('--banner-width', '180px');
  }
  if (shop.topbarContactsSize) document.documentElement.style.setProperty('--topbar-contacts-size', shop.topbarContactsSize + 'px');
  if (shop.headerMenuSize) document.documentElement.style.setProperty('--header-menu-size', shop.headerMenuSize + 'px');

  // Глобальний масштаб тексту в каталозі (не торкається шапки)
  const fs = parseFloat(shop.globalFontScale);
  const scale = (fs >= 0.8 && fs <= 1.5) ? fs : 1.0;
  document.documentElement.style.setProperty('--global-font-scale', scale);

  // Кольори кнопок
  if (shop.buttonColor) {
    document.documentElement.style.setProperty('--accent', shop.buttonColor);
    const hover = shop.buttonHoverColor || darkenColor(shop.buttonColor, 0.15);
    document.documentElement.style.setProperty('--accent-dark', hover);
  }
  if (shop.buttonTextColor) {
    document.documentElement.style.setProperty('--accent-text', shop.buttonTextColor);
  }
  if (shop.successColor) {
    document.documentElement.style.setProperty('--success', shop.successColor);
  }

  // Контакты для шапки (массив строк) — только если включено
  const topContacts = (shop.topbarContactsEnabled !== false) ? (shop.topbarContactsList || []) : [];
  const topContactsHtml = topContacts.length
    ? `<div class="topbar-contacts">${topContacts.map(c => `<div>${linkifyContacts(c)}</div>`).join('')}</div>`
    : '';

  // Логотип
  const logoInner = (shop.logoEnabled && shop.logoImage)
    ? `<img src="${shop.logoImage}" alt="logo" />`
    : '';
  const logoHtml = logoInner
    ? (shop.logoLinksToHome !== false
        ? `<a class="logo" href="/" title="На головну">${logoInner}</a>`
        : `<div class="logo">${logoInner}</div>`)
    : '';

  // Layout шапки — нова система з 3 зонами
  let positions = shop.topbarPositions || null;
  if (!positions) {
    // Legacy: конвертуємо topbarLayout у positions
    if (shop.topbarLayout === 'logo-right') positions = { logo: 'right', title: 'left', menu: 'center', search: 'center', contacts: 'right' };
    else if (shop.topbarLayout === 'centered-title') positions = { logo: 'left', title: 'center', menu: 'center', search: 'center', contacts: 'right' };
    else positions = { logo: 'left', title: 'left', menu: 'center', search: 'center', contacts: 'right' };
  }
  const pos = (name, def) => positions[name] || def;

  // Меню в шапці
  const menuItems = (shop.headerMenuEnabled !== false && Array.isArray(shop.headerMenu))
    ? shop.headerMenu.filter(m => m.enabled !== false && m.title)
    : [];
  const menuHtml = menuItems.length
    ? `<nav class="header-menu">${menuItems.map((m, i) => `
        <button type="button" class="header-menu-item" onclick="openMenuItem(${i})">${escapeHtml(m.title)}</button>
      `).join('')}</nav>`
    : '';

  // Пошук у шапці
  const searchHtml = shop.headerSearchEnabled
    ? `<div class="header-search">
        <input type="search" id="headerSearchInput" value="${escapeAttr(window.searchQuery || '')}"
          placeholder="${escapeAttr(shop.headerSearchPlaceholder || '🔍 Пошук товарів…')}"
          oninput="onSearchInput(this.value)" />
      </div>`
    : '';

  // Заголовок може містити форматування з редактора (HTML) АБО бути звичайним текстом.
  // renderTitle: HTML → компактний санітайз; текст → екран + \n/\\n → <br> (як було).
  const desktopTitle = renderTitle(shop.title);
  const mobTitle = shop.mobileTitle ? renderTitle(shop.mobileTitle) : desktopTitle;
  const titleHtml = shop.titleLinksToHome
    ? `<a class="title-link" href="/" title="На головну"><h1><span class="title-desktop">${desktopTitle}</span><span class="title-mobile">${mobTitle}</span></h1></a>`
    : `<h1><span class="title-desktop">${desktopTitle}</span><span class="title-mobile">${mobTitle}</span></h1>`;
  const cartHtml = `
    <button class="cart-btn" onclick="toggleCart(true)" aria-label="Кошик">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="9" cy="21" r="1.5" fill="currentColor"></circle>
        <circle cx="18" cy="21" r="1.5" fill="currentColor"></circle>
        <path d="M3 3h2.4l2.7 13a2 2 0 0 0 2 1.6h8.5a2 2 0 0 0 2-1.5L22 8H6"></path>
      </svg>
      <span class="cart-btn-text">Кошик</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>`;

  function elementsForZone(zone) {
    const order = shop.topbarElementOrder || { logo: 1, search: 2, title: 3, menu: 4, contacts: 5 };
    function withOrder(html, key) {
      if (!html) return null;
      const o = order[key] || 99;
      // Якщо вже є style="..." — мерджимо order у нього. Якщо нема — додаємо новий.
      const merged = html.replace(/^(\s*<\w+[^>]*?)\s+style="([^"]*?)"/, (_m, p1, p2) => {
        const sep = p2.trim().endsWith(';') || !p2.trim() ? '' : ';';
        return `${p1} style="${p2}${sep}order:${o}"`;
      });
      if (merged !== html) {
        return { order: o, html: merged };
      }
      return { order: o, html: html.replace(/^(\s*<\w+)([^>]*?)>/, `$1$2 style="order:${o}">`) };
    }
    const items = [];
    if (pos('logo','left') === zone) items.push(withOrder(logoHtml, 'logo'));
    if (pos('title','left') === zone) items.push(withOrder(titleHtml, 'title'));
    if (pos('menu','center') === zone) items.push(withOrder(menuHtml, 'menu'));
    if (pos('search','center') === zone) items.push(withOrder(searchHtml, 'search'));
    if (pos('contacts','right') === zone) items.push(withOrder(topContactsHtml, 'contacts'));
    if (zone === 'right') items.push({ order: 99, html: cartHtml.replace(/^(\s*<\w+)([^>]*?)>/, `$1$2 style="order:99">`) });
    return items.filter(Boolean).sort((a, b) => a.order - b.order).map(x => x.html).join('');
  }

  const titlePos = pos('title', 'left'); // 'left' | 'center' | 'right'
  // Зміщення лого і назви — окремі для desktop / mobile
  const _logoX = parseInt(shop.logoOffsetX, 10) || 0;
  const _logoXm = parseInt(shop.logoOffsetXMobile, 10) || 0;
  const _titleX = parseInt(shop.titleOffsetX, 10) || 0;
  const _titleXm = parseInt(shop.titleOffsetXMobile, 10) || 0;
  const _searchX = parseInt(shop.searchOffsetX, 10) || 0;
  const _searchXm = parseInt(shop.searchOffsetXMobile, 10) || 0;
  const _menuX = parseInt(shop.menuOffsetX, 10) || 0;
  const _menuXm = parseInt(shop.menuOffsetXMobile, 10) || 0;
  const _cartX = parseInt(shop.cartOffsetX, 10) || 0;
  const _cartXm = parseInt(shop.cartOffsetXMobile, 10) || 0;
  const _absCls = shop.titleAbsoluteCenter ? ' title-absolute-center' : '';
  const _topbarVars = `--logo-offset-x:${_logoX}px;--logo-offset-x-mobile:${_logoXm}px;--title-offset-x:${_titleX}px;--title-offset-x-mobile:${_titleXm}px;--search-offset-x:${_searchX}px;--search-offset-x-mobile:${_searchXm}px;--menu-offset-x:${_menuX}px;--menu-offset-x-mobile:${_menuXm}px;--cart-offset-x:${_cartX}px;--cart-offset-x-mobile:${_cartXm}px;`;
  document.getElementById('app').innerHTML = `
    <div class="topbar title-${titlePos}${_absCls}" style="${_topbarVars}">
      <div class="topbar-zone left">${elementsForZone('left')}</div>
      <div class="topbar-zone center">${elementsForZone('center')}</div>
      <div class="topbar-zone right">${elementsForZone('right')}</div>
    </div>
    ${renderHomePromo('top')}
    ${renderHeroBanner()}
    <div class="wrap">
      ${shop.subtitle ? `<p class="sub align-${shop.subtitleAlign || 'left'}">${renderRichCompact(shop.subtitle)}</p>` : ''}
      ${renderHomePromo('aboveCatalog')}
      ${shop.catalogTitle && shop.catalogTitle.trim() ? `<h2 class="section-title">${renderRichCompact(shop.catalogTitle)}</h2>` : ''}
      ${renderCategoriesNav()}
      ${productsHtml}
      ${renderFooterContacts()}
    </div>
    ${renderSideBanners()}
  `;
  updateCartBadge();
  renderCart();
  // Запуск ротації банерів (якщо налаштовано)
  startBannerRotation();
  // Адаптивна підгонка розміру заголовка магазину — щоб не налазив.
  // Кілька викликів з різними затримками — щоб точно спрацювало після завантаження шрифтів/картинок.
  setTimeout(fitTopbarTitle, 50);
  setTimeout(fitTopbarTitle, 300);
  setTimeout(fitTopbarTitle, 1000);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => fitTopbarTitle()).catch(() => {});
  }
}

// Динамічно підганяємо ширину/розмір h1 заголовка магазину:
// - Якщо title в ЦЕНТРАЛЬНІЙ зоні — обмежуємо max-width симетрично щоб був по центру
// - Якщо title в ЛІВІЙ або ПРАВІЙ зоні — використовуємо всю ширину зони
// - У обох випадках зменшуємо шрифт якщо текст не влазить
function fitTopbarTitle() {
  const h1 = document.querySelector('.topbar h1');
  const topbar = document.querySelector('.topbar');
  if (!h1 || !topbar) return;

  // На мобільному не обмежуємо
  if (window.innerWidth <= 700) {
    h1.style.fontSize = '';
    h1.style.maxWidth = '';
    return;
  }

  const baseSize = parseInt(typeof shop !== 'undefined' && shop?.topbarTitleSize, 10) || 17;
  const minSize = Math.max(8, parseInt(typeof shop !== 'undefined' && shop?.topbarTitleMinSize, 10) || 14);
  const titleZone = h1.closest('.topbar-zone');
  const isCenter = titleZone?.classList.contains('center');

  // 1. Скидаємо обмеження
  h1.style.maxWidth = '';
  h1.style.fontSize = baseSize + 'px';
  void topbar.offsetWidth;

  let available = 0;
  let lw = 0, rw = 0;

  if (isCenter) {
    // Симетричне центрування — обмежуємо щоб не налазив на сусідні зони
    const leftZ = document.querySelector('.topbar-zone.left');
    const rightZ = document.querySelector('.topbar-zone.right');
    const tbRect = topbar.getBoundingClientRect();
    const tbCenter = (tbRect.left + tbRect.right) / 2;
    let leftEnd = tbRect.left + 16;
    let rightStart = tbRect.right - 16;
    if (leftZ) {
      for (const c of leftZ.children) {
        const r = c.getBoundingClientRect();
        if (r.right > leftEnd) leftEnd = r.right;
      }
      lw = leftZ.offsetWidth;
    }
    if (rightZ) {
      for (const c of rightZ.children) {
        const r = c.getBoundingClientRect();
        if (r.left < rightStart) rightStart = r.left;
      }
      rw = rightZ.offsetWidth;
    }
    const leftDist = tbCenter - leftEnd;
    const rightDist = rightStart - tbCenter;
    const minDist = Math.min(leftDist, rightDist);
    available = Math.max(0, 2 * (minDist - 16));
    if (available > 80) {
      h1.style.maxWidth = available + 'px';
      void h1.offsetWidth;
    }
  } else if (titleZone) {
    // Title в лівій або правій зоні — НЕ чіпаємо JS-ом взагалі.
    // CSS: grid `auto 1fr auto` дозволяє зоні рости до max-content,
    // h1 з overflow:hidden + ellipsis сам обрізатиметься якщо не вміщається.
    return;
  }

  // 2. Якщо при базовому шрифті не влазить — зменшуємо
  let size = baseSize;
  let safety = 50;
  while (h1.scrollWidth > h1.clientWidth + 1 && size > minSize && safety-- > 0) {
    size -= 1;
    h1.style.fontSize = size + 'px';
  }

  // ДЕБАГ
  if (window.__showFitDebug) {
    let dbg = document.getElementById('__fitDbg');
    if (!dbg) {
      dbg = document.createElement('div');
      dbg.id = '__fitDbg';
      dbg.style.cssText = 'position:fixed;top:0;right:0;background:#fef3c7;color:#92400e;padding:6px 10px;font:12px monospace;z-index:9999;border:1px solid #f59e0b;border-radius:0 0 0 6px;';
      document.body.appendChild(dbg);
    }
    const zoneName = isCenter ? 'CENTER' : (titleZone?.classList.contains('left') ? 'LEFT' : 'RIGHT');

// Получить превью-картинку для видео-ссылки
function getVideoThumb(url) {
  const s = String(url || '').trim();
  if (!s) return '';
  // YouTube
  const yt = s.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (yt) return `https://img.youtube.com/vi/${yt[1]}/hqdefault.jpg`;
  // Google Drive — нет публичного API превью без token. Возвращаем пусто, нарисуем gradient.
  return '';
}

function bannerItemHtml(item) {
  if (!item || !item.enabled) return '';
  const { image: IMG, video: VIDEO, text: TEXT, link: LINK, productId: PID } = item;

  let mediaHtml = '';
  if (VIDEO && parseVideoUrl(VIDEO)) {
    const thumb = getVideoThumb(VIDEO) || IMG;
    const thumbInner = thumb
      ? `<img src="${escapeAttr(thumb)}" alt="" />`
      : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#0b8aff,#1d6fcf);"></div>`;
    mediaHtml = `<div class="banner-video" onclick="openBannerVideo('${escapeAttr(VIDEO)}'); event.stopPropagation();">${thumbInner}<div class="play-icon"></div></div>`;
  } else if (IMG) {
    mediaHtml = `<img src="${IMG}" alt="" />`;
  }
  const textHtml = TEXT ? `<div class="text">${renderRichCompact(TEXT)}</div>` : '';
  if (!mediaHtml && !textHtml) return '';

  // Визначаємо посилання: спочатку productId, потім link
  let href = '';
  if (PID) href = `?product=${encodeURIComponent(PID)}`;
  else if (LINK) href = LINK;

  const inner = mediaHtml + textHtml;
  // Якщо є посилання і немає відео — обгортаємо все
  // Якщо є відео + посилання + текст — посилання тільки на тексті
  const isExternal = href && !href.startsWith('?');
  const target = isExternal ? ` target="_blank" rel="noopener"` : '';
  let wrapped;
  if (href && !VIDEO) {
    wrapped = `<a href="${escapeAttr(href)}"${target}>${inner}</a>`;
  } else if (href && VIDEO && textHtml) {
    wrapped = `${mediaHtml}<a href="${escapeAttr(href)}"${target}>${textHtml}</a>`;
  } else {
    wrapped = inner;
  }
  return `<div class="side-banner-item">${wrapped}</div>`;
}

function bannerSideHtml(side) {

  const fx = sb.transitionEffect || 'fade';

    return `<div class="${cls}">${html}</div>`;

}

function hpChipLabel(p, style) {

// Банер активної категорії має пріоритет; якщо у категорії банер вимкнено — показуємо глобальний Hero.
function getActiveHeroBanner() {
  try {
    const slug = getEffectiveCategoryId();
    if (slug && shop.categoryBanners) {
      const cat = (shop.categories || []).find(c => c.slug === slug);
      const cb = cat && shop.categoryBanners[cat.id];
      if (cb && cb.enabled) return cb;
    }
  } catch (e) {}
  return shop.heroBanner;
}

function renderHeroBanner() {
  const h = getActiveHeroBanner();
  if (!h || !h.enabled) return '';
  const hasImage = !!h.image;
  const hasText = !!(h.text && h.text.trim());
  if (!hasImage && !hasText) return '';

  // Збираємо всі слайди (бекомп: images може бути масив рядків АБО об'єктів {url, link, productId})
  const extraImages = Array.isArray(h.images) ? h.images : [];
  const normalizeSlide = (item, fallbackLink, fallbackProductId) => {
    if (typeof item === 'string') return { url: item, link: fallbackLink || '', productId: fallbackProductId || '' };
    return { url: item?.url || '', link: item?.link || '', productId: item?.productId || '' };
  };
  // Перший слайд — основне зображення (з посиланням з base h.link/productId)
  let slides = [];
  if (hasImage) slides.push({ url: h.image, link: h.link || '', productId: h.productId || '' });
  for (const it of extraImages) {
    const s = normalizeSlide(it, h.link, h.productId);
    if (s.url) slides.push(s);
  }

  const minH = parseInt(h.minHeight, 10) || 250;
  const padY = parseInt(h.paddingY, 10) || 30;
  const align = ['top', 'center', 'bottom'].includes(h.textPosition) ? h.textPosition : 'center';
  const justify = align === 'top' ? 'flex-start' : (align === 'bottom' ? 'flex-end' : 'center');
  const tAlign = ['left', 'center', 'right'].includes(h.textAlign) ? h.textAlign : 'center';
  const opacity = (typeof h.textBgOpacity === 'number' && h.textBgOpacity >= 0 && h.textBgOpacity <= 1) ? h.textBgOpacity : 0.4;
  const overlay = (slides.length > 0 && opacity > 0) ? `background: rgba(0,0,0,${opacity});` : '';

  const textColor = h.textColor || '#fff';
  const textHtml = hasText
    ? `<div class="hero-banner-text" style="color:${escapeAttr(textColor)}; text-align:${tAlign};">${renderRichCompact(h.text)}</div>`
    : '';

  const innerStyle = `min-height:${minH}px; padding:${padY}px 16px; justify-content:${justify};`;
  const inner = `<div class="hero-banner-inner" style="${innerStyle}">${textHtml}</div>`;
  const overlayDiv = overlay ? `<div class="hero-banner-overlay" style="${overlay}"></div>` : '';

  // Якщо ротація включена і слайдів >1 — рендеримо як слайдшоу
  const useSlides = h.rotateEnabled && slides.length > 1;
  const fx = h.transitionEffect || 'fade';
  const fxClass = useSlides ? ` fx-${fx}` : '';

  if (useSlides) {
    const slidesHtml = slides.map((s, i) => {
      const slideHref = s.productId ? `?product=${encodeURIComponent(s.productId)}` : (s.link || '');
      const isExt = slideHref && !slideHref.startsWith('?');
      const target = isExt ? ' target="_blank" rel="noopener"' : '';
      const cls = `hero-slide${i === 0 ? ' active' : ''}`;
      const bg = `background-image:url('${escapeAttr(s.url)}');`;
      if (slideHref) {
        return `<a class="${cls}" style="${bg}" href="${escapeAttr(slideHref)}"${target} aria-hidden="${i !== 0}"></a>`;
      }
      return `<div class="${cls}" style="${bg}" aria-hidden="${i !== 0}"></div>`;
    }).join('');
    return `<div class="hero-banner${fxClass}">${slidesHtml}${overlayDiv}${inner}</div>`;
  }

  // Звичайний (одна картинка)
  const bg = hasImage ? `background-image: url('${escapeAttr(h.image)}');` : '';
  let href = '';
  if (h.productId) href = `?product=${encodeURIComponent(h.productId)}`;
  else if (h.link) href = h.link;
  const isExternal = href && !href.startsWith('?');
  const target = isExternal ? ` target="_blank" rel="noopener"` : '';
  const content = `${overlayDiv}${inner}`;
  if (href) {
    return `<a class="hero-banner" style="${bg}" href="${escapeAttr(href)}"${target}>${content}</a>`;
  }
  return `<div class="hero-banner" style="${bg}">${content}</div>`;
}

// === Авто-ротація банерів ===
let _bannerRotationTimers = [];
function startBannerRotation() {
  // Зупиняємо попередні таймери (бо renderShop може викликатись повторно)
  _bannerRotationTimers.forEach(t => clearInterval(t));
  _bannerRotationTimers = [];

  // 1. Hero-банер: переключаємо .active між .hero-slide
  const h = getActiveHeroBanner();
  if (h && h.enabled && h.rotateEnabled) {
    const heroEl = document.querySelector('.hero-banner');
    const slides = heroEl ? heroEl.querySelectorAll('.hero-slide') : [];
    if (slides.length > 1) {
      let idx = 0;
      const intervalMs = Math.max(1000, (parseFloat(h.rotateInterval) || 5) * 1000);
      const timer = setInterval(() => {
        const cur = slides[idx];
        idx = (idx + 1) % slides.length;
        const next = slides[idx];
        // Анімація: старий → exiting, новий → active
        cur.classList.remove('active');
        cur.classList.add('exiting');
        next.classList.add('active');
        // Через 600мс прибираємо exiting (=transition CSS duration)
        setTimeout(() => cur.classList.remove('exiting'), 650);
      }, intervalMs);
      _bannerRotationTimers.push(timer);
    }
  }

  // 2. Бічні банери: переключаємо .active між .side-banner-item
  const sb = shop.sideBanners;
  if (sb && sb.rotateEnabled) {
    const intervalMs = Math.max(1000, (parseFloat(sb.rotateInterval) || 5) * 1000);
    ['left', 'right'].forEach(side => {
      const stack = document.querySelector(`.side-banner-stack.${side}.carousel`);
      if (!stack) return;
      const items = stack.querySelectorAll('.side-banner-item');
      if (items.length <= 1) return;
      let idx = 0;
      const timer = setInterval(() => {
        const cur = items[idx];
        idx = (idx + 1) % items.length;
        const next = items[idx];
        cur.classList.remove('active');
        cur.classList.add('exiting');
        next.classList.add('active');
        setTimeout(() => cur.classList.remove('exiting'), 650);
      }, intervalMs);
      _bannerRotationTimers.push(timer);
    });
  }
}

function darkenColor(hex, amount = 0.15) {
  const m = String(hex || '').match(/^#?([a-f0-9]{3}|[a-f0-9]{6})$/i);
  if (!m) return hex;
  let h = m[1]; if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const r = Math.max(0, Math.round(parseInt(h.slice(0,2), 16) * (1 - amount)));
  const g = Math.max(0, Math.round(parseInt(h.slice(2,4), 16) * (1 - amount)));
  const b = Math.max(0, Math.round(parseInt(h.slice(4,6), 16) * (1 - amount)));
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function getReadableTextColor(bg) {
  const m = String(bg || '').match(/^#?([a-f0-9]{3}|[a-f0-9]{6})$/i);
  if (!m) return '#1c2129';
  let hex = m[1];
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const r = parseInt(hex.slice(0, 2), 16);
  const g = parseInt(hex.slice(2, 4), 16);
  const b = parseInt(hex.slice(4, 6), 16);
  const yiq = (r * 299 + g * 587 + b * 114) / 1000;
  return yiq >= 140 ? '#1c2129' : '#ffffff';
}

// Превращает телефоны, email, URL и @username в правильные ссылки.
function linkifyContacts(text) {
  let html = escapeHtml(text);
  // 1. Email — на mailto:
  html = html.replace(/([a-z0-9._+-]+@[a-z0-9.-]+\.[a-z]{2,})/gi, '<a href="mailto:$1">$1</a>');
  // 2. Телефоны: +380 99 ... → tel:
  html = html.replace(/(\+\d[\d\s\-()]{8,})/g, m => {
    const digits = m.replace(/\D/g, '');
    return `<a href="tel:+${digits}">${m}</a>`;
  });
  // 3. URL → http
  html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // 4. @username — только если не часть email и не уже в href
  // Negative lookbehind на буквы/цифры (чтоб не сработало на email который уже стал mailto-ссылкой)
  html = html.replace(/(^|[^\w>"\/])@([a-z0-9_.]+)\b/gi, (full, prefix, name) => {
    return `${prefix}<a href="https://instagram.com/${name}" target="_blank" rel="noopener">@${name}</a>`;
  });
  return html;
}

// Промокоди-бейджі для товару, окремо для поверхні: 'card' (картка) або 'modal' (модалка).
// Видимість керується чекбоксами промокоду: showOnCard / showOnModal.
// Старі промо без showOnModal: модалка повторює showOnCard (зворотна сумісність).
// Адресний промо на конкретний товар (scope=products з його id) показуємо завжди — і на картці, і в модалці.
function getProductPromoBadges(p, surface) {
  surface = surface || 'card';
  const now = new Date();
  return (shop.promoCodes || []).filter(promo => {
    if (!promo || promo.enabled === false) return false;
    if (promo.validUntil && new Date(promo.validUntil) < now) return false;
    if (promo.validFrom && new Date(promo.validFrom) > now) return false;
    const scope = promo.scope || 'all';
    const isThisProduct = scope === 'products' && Array.isArray(promo.productIds) && promo.productIds.includes(p.id);
    const showCard = !!promo.showOnCard;
    const showModal = (promo.showOnModal === undefined) ? !!promo.showOnCard : !!promo.showOnModal;
    const surfaceOn = surface === 'modal' ? showModal : showCard;
    if (!surfaceOn && !isThisProduct) return false;
    if (scope === 'all') return true;
    if (scope === 'categories') return Array.isArray(promo.categoryIds) && promo.categoryIds.includes(p.categoryId);
    if (scope === 'products') return isThisProduct;
    return false;
  });
}
function promoBadgesHtml(p, surface) {
  const promos = getProductPromoBadges(p, surface);

  try {

      navigator.clipboard.writeText(code).then(done).catch(() => fallbackCopy(code, done));

};
function fallbackCopy(text, cb) {
