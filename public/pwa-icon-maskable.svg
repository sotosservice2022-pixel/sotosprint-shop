<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AGPRNT">
  <defs>
    <linearGradient id="pwaGradM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34a8ff"/>
      <stop offset="0.55" stop-color="#0b8aff"/>
      <stop offset="1" stop-color="#0670d9"/>
    </linearGradient>
  </defs>
  <!-- Заливка на всю площу — для maskable важливо, щоб фон покривав весь квадрат,
       а лого вписувалось у безпечну зону (~80% по центру). -->
  <rect x="0" y="0" width="512" height="512" fill="url(#pwaGradM)"/>
  <text x="256" y="266" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="200" font-weight="800" letter-spacing="-6" fill="#ffffff">AG</text>
</svg>
