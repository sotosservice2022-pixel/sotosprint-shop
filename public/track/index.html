<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b8aff" />
<meta name="robots" content="noindex" />
<title>Відстеження замовлення</title>
<style>
  :root { --accent:#0b8aff; --accent-dark:#0670d9; --bg:#f4f6fa; --card:#fff; --text:#1c2129; --muted:#6b7280; --border:#e5e7eb; }
  * { box-sizing:border-box; }
  body { font-family:'Segoe UI',-apple-system,Arial,sans-serif; margin:0; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; }
  .wrap { width:100%; max-width:520px; }
  .brand { text-align:center; margin-bottom:18px; }
  .brand a { color:var(--muted); text-decoration:none; font-size:14px; }
  h1 { font-size:22px; margin:0 0 6px; text-align:center; }
  .sub { color:var(--muted); font-size:14px; text-align:center; margin:0 0 20px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px;
    box-shadow:0 2px 12px rgba(0,0,0,.05); }
  label { display:block; font-size:13px; font-weight:600; margin:0 0 6px; }
  input { width:100%; padding:12px 14px; font-size:16px; border:1px solid var(--border); border-radius:10px;
    margin-bottom:14px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { width:100%; padding:13px; font-size:16px; font-weight:700; color:#fff; background:var(--accent);
    border:none; border-radius:10px; cursor:pointer; }
  button:disabled { opacity:.6; cursor:default; }
  .result { margin-top:18px; }
  .status-badge { display:inline-block; padding:6px 14px; border-radius:20px; font-weight:700; font-size:15px; }
  .st-done { background:#dcfce7; color:#166534; }
  .st-processing { background:#fef3c7; color:#92400e; }
  .row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .row:last-child { border-bottom:none; }
  .row .k { color:var(--muted); }
  .row .v { font-weight:600; text-align:right; }
  .np-box { margin-top:16px; padding:14px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:12px; }
  .np-box h3 { margin:0 0 8px; font-size:15px; color:var(--accent-dark); }
  .err { margin-top:16px; padding:12px 14px; background:#fef2f2; border:1px solid #fecaca; color:#b91c1c;
    border-radius:10px; font-size:14px; }
  input.invalid { border-color:#dc2626; }
  .field-err { display:none; color:#b91c1c; font-size:13px; margin:-8px 0 14px; }
  .field-err.show { display:block; }
  .muted { color:var(--muted); font-size:13px; }
  .hidden { display:none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><a href="/">← На головну</a></div>
    <h1 id="pageTitle">📦 Відстеження замовлення</h1>
    <p class="sub">Введіть номер замовлення і телефон, на який оформляли</p>

    <div class="card" id="formCard">
      <form id="trackForm">
        <label for="orderId">Номер замовлення</label>
        <input id="orderId" type="text" inputmode="numeric" placeholder="напр. 1024" autocomplete="off" />
        <label for="phone">Телефон</label>
        <input id="phone" type="tel" inputmode="tel" placeholder="напр. 0991234567" autocomplete="tel" />
        <div class="field-err" id="phoneErr">Перевірте номер — має бути 0XXXXXXXXX (10 цифр) або +380XXXXXXXXX</div>
        <button type="submit" id="submitBtn">Перевірити статус</button>
      </form>
      <div id="errBox" class="err hidden"></div>
      <div id="result" class="result hidden"></div>
    </div>

    <div class="card hidden" id="disabledCard">
      <p style="text-align:center;margin:0">Відстеження замовлень тимчасово недоступне.</p>
    </div>
  </div>

<script>
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric' }); }
  catch { return ''; }
}
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

(async () => {
  // Перевірка чи фіча увімкнена + тема
  try {
    const r = await fetch('/api/shop?t=' + Date.now(), { cache: 'no-store' });
    const shop = await r.json();
    // Кастомний favicon з налаштувань (Зовнішній вигляд → Favicon)
    if (shop.faviconImage) {
      let icon = document.querySelector('link[rel="icon"]');
      if (!icon) { icon = document.createElement('link'); icon.rel = 'icon'; document.head.appendChild(icon); }
      icon.href = shop.faviconImage;
    }
    if (shop.pwaThemeColor) {
      document.documentElement.style.setProperty('--accent', shop.pwaThemeColor);
    }
    if (!(shop.orderTrackingEnabled === true && shop.trackPageEnabled !== false)) {
      document.getElementById('formCard').classList.add('hidden');
      document.getElementById('disabledCard').classList.remove('hidden');
      return;
    }
    // Редаговані тексти/підказки з адмінки
    if (shop.trackTitle) { document.getElementById('pageTitle').textContent = shop.trackTitle; document.title = shop.trackTitle; }
    if (shop.trackSubtitle) document.querySelector('.sub').textContent = shop.trackSubtitle;
    if (shop.trackOrderPlaceholder) document.getElementById('orderId').placeholder = shop.trackOrderPlaceholder;
    if (shop.trackPhonePlaceholder) document.getElementById('phone').placeholder = shop.trackPhonePlaceholder;
  } catch (_) {}

  const form = document.getElementById('trackForm');
  const btn = document.getElementById('submitBtn');
  const errBox = document.getElementById('errBox');
  const result = document.getElementById('result');

  // === Захист від неправильного номера телефону ===
  // Приймаємо українські формати: 0XXXXXXXXX (10 цифр) або +380XXXXXXXXX / 380XXXXXXXXX (12 цифр)
  const phoneEl = document.getElementById('phone');
  const phoneErr = document.getElementById('phoneErr');
  function phoneValid() {
    const d = phoneEl.value.replace(/\D/g, '');
    return (d.length === 10 && d.startsWith('0')) || (d.length === 12 && d.startsWith('380'));
  }
  function setPhoneErr(on) {
    phoneErr.classList.toggle('show', on);
    phoneEl.classList.toggle('invalid', on);
  }
  // Пускаємо лише цифри та службові символи (+, пробіл, дужки, дефіс)
  phoneEl.addEventListener('keydown', (e) => {
    if (e.key.length === 1 && !/[\d+\s()\-]/.test(e.key)) e.preventDefault();
  });
  phoneEl.addEventListener('input', () => {
    const v = phoneEl.value.replace(/[^\d+\s()\-]/g, '').slice(0, 20);
    if (phoneEl.value !== v) phoneEl.value = v;
    if (phoneValid()) setPhoneErr(false); // помилка зникає, щойно номер став коректним
  });
  phoneEl.addEventListener('blur', () => {
    const d = phoneEl.value.replace(/\D/g, '');
    setPhoneErr(d.length > 0 && !phoneValid());
  });

  // Передзаповнення з URL ?order=123&phone=...
  const params = new URLSearchParams(location.search);
  if (params.get('order')) document.getElementById('orderId').value = params.get('order');
  if (params.get('phone')) document.getElementById('phone').value = params.get('phone');

  // Секретне посилання (?t=...) — показуємо статус одразу, без жодного вводу.
  // Якщо токен невалідний — повертаємо форму ручного вводу як запасний варіант.
  const tkn = (params.get('t') || '').trim();
  if (tkn) {
    form.style.display = 'none';
    try {
      const r = await fetch('/api/track', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: tkn }),
      });
      const data = await r.json();
      if (data.ok) {
        renderResult(data.order);
      } else {
        form.style.display = '';
        errBox.textContent = 'Посилання недійсне або застаріле. Введіть номер замовлення і телефон вручну.';
        errBox.classList.remove('hidden');
      }
    } catch (_) {
      form.style.display = '';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.classList.add('hidden');
    result.classList.add('hidden');
    const orderId = document.getElementById('orderId').value.trim();
    const phone = phoneEl.value.trim();
    if (!orderId || !phone) { errBox.textContent = 'Заповніть обидва поля.'; errBox.classList.remove('hidden'); return; }
    if (!phoneValid()) { setPhoneErr(true); phoneEl.focus(); return; }

    btn.disabled = true; btn.textContent = 'Перевіряю…';
    try {
      const r = await fetch('/api/track', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderId, phone }),
      });
      const data = await r.json();
      if (!data.ok) {
        errBox.textContent = data.error || 'Не вдалося отримати статус.';
        errBox.classList.remove('hidden');
      } else {
        renderResult(data.order);
      }
    } catch (_) {
      errBox.textContent = 'Мережа недоступна. Спробуйте ще раз.';
      errBox.classList.remove('hidden');
    } finally {
      btn.disabled = false; btn.textContent = 'Перевірити статус';
    }
  });

  function renderResult(o) {
    const stClass = o.status === 'done' ? 'st-done' : 'st-processing';
    let html = `
      <div style="text-align:center;margin-bottom:14px">
        <span class="status-badge ${stClass}">${esc(o.statusLabel)}</span>
      </div>
      <div class="row"><span class="k">Замовлення</span><span class="v">#${esc(o.id)}</span></div>`;
    if (o.createdAt) html += `<div class="row"><span class="k">Оформлено</span><span class="v">${esc(fmtDate(o.createdAt))}</span></div>`;
    if (o.itemsCount != null) html += `<div class="row"><span class="k">Кількість</span><span class="v">${esc(o.itemsCount)} шт</span></div>`;
    if (o.totalPrice != null) html += `<div class="row"><span class="k">Сума</span><span class="v">${esc(o.totalPrice)} ₴</span></div>`;
    if (o.delivery) html += `<div class="row"><span class="k">Доставка</span><span class="v">${esc(o.delivery)}</span></div>`;

    if (o.np) {
      html += `<div class="np-box"><h3>🚚 Нова Пошта</h3>`;
      html += `<div class="row"><span class="k">Статус посилки</span><span class="v">${esc(o.np.status || '—')}</span></div>`;
      if (o.np.warehouse) html += `<div class="row"><span class="k">Відділення</span><span class="v">${esc(o.np.warehouse)}</span></div>`;
      if (o.np.actualDelivery) html += `<div class="row"><span class="k">Доставлено</span><span class="v">${esc(o.np.actualDelivery)}</span></div>`;
      if (o.ttn) html += `<div class="row"><span class="k">ТТН</span><span class="v">${esc(o.ttn)}</span></div>`;
      html += `</div>`;
    } else if (o.hasTtn) {
      html += `<p class="muted" style="margin-top:14px">Посилку передано Новій Пошті, статус оновлюється.</p>`;
    }

    result.innerHTML = html;
    result.classList.remove('hidden');
  }
})();
</script>
</body>
</html>
