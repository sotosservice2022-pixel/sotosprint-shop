<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Дякуємо за замовлення</title>
  <style>
    :root { --accent: #2563eb; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f3f4f6; color: #111827; padding: 20px;
    }
    .card {
      background: #fff; border-radius: 18px; padding: 36px 28px; max-width: 460px; width: 100%;
      text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    .check {
      width: 76px; height: 76px; border-radius: 50%; background: #dcfce7; color: #16a34a;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 40px;
    }
    h1 { font-size: 22px; margin: 0 0 10px; }
    p { color: #4b5563; line-height: 1.6; margin: 0 0 8px; }
    .muted { font-size: 13px; color: #9ca3af; margin-top: 14px; }
    a.btn {
      display: inline-block; margin-top: 22px; background: var(--accent); color: #fff;
      text-decoration: none; padding: 12px 24px; border-radius: 10px; font-weight: 600;
    }
    a.btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Дякуємо за замовлення!</h1>
    <p>Оплату отримано або обробляється. Щойно платіж підтвердиться, ваше замовлення буде прийнято в роботу.</p>
    <p>Ми зв'яжемось з вами для уточнення деталей.</p>
    <a class="btn" href="/">← На головну</a>
    <div class="muted">Повернення на головну за <span id="cnt">8</span> с…</div>
  </div>
  <script>
    let n = 8;
    const el = document.getElementById('cnt');
    const t = setInterval(() => {
      n--; if (el) el.textContent = n;
      if (n <= 0) { clearInterval(t); location.href = '/'; }
    }, 1000);
  </script>
</body>
</html>
